let lastRefreshTime = {};
let pageVisible = !document.hidden;
let refreshInterval = null;

function smartRefresh() {
  if (!pageVisible) return;  // Don't refresh when tab is hidden
  const now = Date.now();
  // Home feed - only every 60 seconds
  if (currentPage === 'home' && (!lastRefreshTime.home || now - lastRefreshTime.home > 60000)) {
    lastRefreshTime.home = now;
    // Only update if there are no active media (videos, iframes) playing
    const hasPlayingMedia = document.querySelector('video[autoplay], iframe[src*="youtube"]');
    if (!hasPlayingMedia) loadHomeFeed();
  }
  // Notifications - every 30 sec
  if (currentPage === 'notifications' && (!lastRefreshTime.notif || now - lastRefreshTime.notif > 30000)) {
    lastNotificationsFetch = now;
    loadNotifications();
  }
  // Incoming call check - every 10 sec
  if (currentUser && !currentCall) {
    checkForIncomingCall();
  }
  // Scan for new media elements to track for auto-pause
  scanForNewMedia();
}

// Pause refresh when tab is hidden
document.addEventListener('visibilitychange', () => {
  pageVisible = !document.hidden;
  if (pageVisible) {
    // Refresh on visible if it's been a while
    if (currentPage === 'home') {
      lastRefreshTime.home = 0;  // Force refresh

// JITSI CALL SYSTEM (replaces custom WebRTC)
// ============================================================
let jitsiCall = null;  // Active call object
let jitsiCallTimerInterval = null;
let jitsiCallStartTime = null;
let ringtoneAudio = null;
let ringtonePlaying = false;
let callStatusPollInterval = null;

// Initiate a call using Jitsi
async function startCall(type, targetUserId, groupId = null) {
  if (!currentUser) { toast('Please register first'); return; }
  if (jitsiCall) { toast('❌ You are already in a call'); return; }

  // Group call permissions check
  if (groupId && currentGroup) {
    try {
      const gr = await fetch(API + '/api/groups/' + currentGroup).then(r => r.json());
      if (gr.success) {
        const g = gr.group;
        if (g.blockedMembers?.includes(currentUser.id)) {
          toast('🚫 Admin ने आपको block किया है');
          return;
        }
        if (!g.members.includes(currentUser.id)) {
          toast('❌ पहले group join करें');
          return;
        }
        const whoCanCall = g.whoCanCall || 'everyone';
        const isAdmin = g.admins?.includes(currentUser.id);
        if (whoCanCall === 'admins_only' && !isAdmin) {
          toast('🚫 सिर्फ admin ही call कर सकते हैं');
          return;
        }
        if (whoCanCall === 'specific' && !(g.allowedCallers || []).includes(currentUser.id) && !isAdmin) {
          toast('🚫 Admin ने आपको call permission नहीं दी है');
          return;
        }
      }
    } catch (e) { /* continue */ }
  }

  // Initiate call via new Jitsi endpoint
  const res = await fetch(API + '/api/calls/initiate', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ fromUserId: currentUser.id, toUserId: targetUserId, groupId, type }),
  }).then(r => r.json());
  if (!res.success) {
    if (res.error && res.error.includes('blocked')) toast('🚫 ' + res.error);
    else if (res.error && res.error.includes('admin')) toast('🚫 ' + res.error);
    else if (res.error && res.error.includes('allowed')) toast('🚫 ' + res.error);
    else toast('❌ ' + (res.error || 'Failed to start call'));
    return;
  }

  jitsiCall = res.call;
  // Open Jitsi call modal immediately (caller joins the room)
  openJitsiCall(jitsiCall.jitsiUrl, targetUserId ? res.call.calleeName : (groupId ? 'Group Call' : 'User'), jitsiCall.callId);
  toast(targetUserId ? '📞 Calling...' : '📞 Group call started');

  // Poll call status to detect when receiver accepts (for 1-on-1) or if call was declined
  if (callStatusPollInterval) clearInterval(callStatusPollInterval);
  let pollCount = 0;
  callStatusPollInterval = setInterval(async () => {
    pollCount++;
    try {
      const statusRes = await fetch(API + '/api/calls/' + jitsiCall.callId + '/status').then(r => r.json());
      if (statusRes.success && statusRes.call) {
        const c = statusRes.call;
        if (c.status === 'declined') {
          toast('❌ Call was declined');
          endJitsiCall();
        } else if (c.status === 'ended' && c.endedBy !== currentUser.id) {
          // Someone else ended the call
          toast('Call ended');
          endJitsiCall();
        } else if (c.status === 'active') {
          // Call accepted - keep going
          if (pollCount > 1) toast('✅ Call connected!');
        }
        // Stop polling after 60 seconds (auto-miss)
        if (pollCount > 60 && c.status === 'ringing') {
          toast('📞 No answer');
          endJitsiCall();
        }
      }
    } catch (e) { /* ignore */ }
  }, 1000);
}

// Open Jitsi iframe modal
function openJitsiCall(jitsiUrl, title, callId) {
  const modal = document.getElementById('jitsiCallModal');
  const frame = document.getElementById('jitsiFrame');
  document.getElementById('jitsiCallTitle').textContent = '📞 ' + (title || 'Call');
  // Add user display name as Jitsi prejoin config
  const userName = currentUser?.name || 'Guest';
  // Jitsi meet URL with prejoin config
  const hashParams = `#userInfo.displayName=${encodeURIComponent(userName)}&config.prejoinPageEnabled=false&config.startWithAudioMuted=true&config.startWithVideoMuted=${jitsiCall?.type === 'voice' ? 'true' : 'false'}`;
  frame.src = jitsiUrl + hashParams;
  modal.classList.add('show');
  document.body.style.overflow = 'hidden';
  // Start timer
  jitsiCallStartTime = Date.now();
  if (jitsiCallTimerInterval) clearInterval(jitsiCallTimerInterval);
  jitsiCallTimerInterval = setInterval(() => {
    const seconds = Math.floor((Date.now() - jitsiCallStartTime) / 1000);
    const m = Math.floor(seconds / 60).toString().padStart(2, '0');
    const s = (seconds % 60).toString().padStart(2, '0');
    const timerEl = document.getElementById('jitsiCallTimer');
    if (timerEl) timerEl.textContent = `${m}:${s}`;
  }, 1000);
}

function minimizeJitsiCall() {
  const modal = document.getElementById('jitsiCallModal');

// End the active Jitsi call
async function endJitsiCall() {
  // Notify backend
  if (jitsiCall) {
    try {
      await fetch(API + '/api/calls/' + jitsiCall.callId + '/end', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: currentUser.id }),
      });
    } catch (e) { /* ignore */ }
  }
  // Stop ringtone if playing
  stopRingtone();
  // Close modal
  const modal = document.getElementById('jitsiCallModal');
  modal.classList.remove('show');
  document.body.style.overflow = '';
  // Clear iframe src to stop media
  document.getElementById('jitsiFrame').src = 'about:blank';
  // Stop timer
  if (jitsiCallTimerInterval) {
    clearInterval(jitsiCallTimerInterval);
    jitsiCallTimerInterval = null;
  }
  if (callStatusPollInterval) {
    clearInterval(callStatusPollInterval);
    callStatusPollInterval = null;
  }
  // Remove floating button
  const floatingBtn = document.getElementById('floatingCallBtn');
  if (floatingBtn) floatingBtn.remove();
  jitsiCall = null;
  toast('📞 Call ended');
}

// Ringtone using Web Audio API (no audio file needed)
function playRingtone() {
  if (ringtonePlaying) return;
  ringtonePlaying = true;
  try {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) return;
    const ctx = new AudioCtx();
    let note = 0;
    const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
    function playNote() {
      if (!ringtonePlaying) { ctx.close(); return; }
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = notes[note % notes.length];
      gain.gain.setValueAtTime(0, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.05);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.4);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.5);
      note++;
      if (ringtonePlaying) setTimeout(playNote, 500);
    }
    playNote();
    ringtoneAudio = { ctx };
  } catch (e) { console.warn('Ringtone failed:', e); }
}

function stopRingtone() {
  ringtonePlaying = false;
  if (ringtoneAudio && ringtoneAudio.ctx) {
    try { ringtoneAudio.ctx.close(); } catch (e) { /* ignore */ }
  }
  ringtoneAudio = null;
  // Vibrate stop
  if (navigator.vibrate) navigator.vibrate(0);
}

function showCallScreen(call, type) {

function updateParticipants() {

function startCallTimer() {

function startSignaling() {
  if (signalPollInterval) clearInterval(signalPollInterval);
  // Poll every 800ms for fast signaling - needed for ICE candidates
  signalPollInterval = setInterval(pollSignals, 800);
}

async function pollSignals() {
  if (!currentCall || !currentUser) return;
  try {
    // Refresh call status and poll signals in parallel for speed
    const [callRes, sigRes] = await Promise.all([
      fetch(API + '/api/calls/' + currentCall.callId).then(r => r.json()),
      fetch(API + '/api/calls/' + currentCall.callId + '/signals/' + currentUser.id).then(r => r.json()),
    ]);
    if (callRes.success) {
      currentCall = callRes.call;
      updateParticipants();
      if (currentCall.status === 'ended') {
        cleanupCall();
        toast('Call ended');
        return;
      }
      // Initialize peer connections for new participants
      for (const p of currentCall.participants) {
        if (p.userId !== currentUser.id && !peerConnections[p.userId]) {
          // The user who already has media stream (joined earlier) should create offer
          if (currentCall.fromUserId === currentUser.id) {
            createPeerConnection(p.userId, true);
          } else {
            createPeerConnection(p.userId, false);
          }
        }
      }
    }
    // Process all signals
    if (sigRes.signals) {
      for (const sig of sigRes.signals) {
        await handleSignal(sig);
      }
    }
  } catch (e) {
    console.warn('Poll error:', e);
  }
}

function createPeerConnection(remoteUserId, isInitiator) {
  const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
  // Queue ICE candidates that arrive before remote description is set
  const iceCandidateQueue = [];
  let remoteDescSet = false;
  pc.onsignalingstatechange = () => {
    if (pc.signalingState === 'stable' || pc.remoteDescription) {
      remoteDescSet = true;
      // Flush queued candidates
      while (iceCandidateQueue.length > 0) {
        const candidate = iceCandidateQueue.shift();
        pc.addIceCandidate(candidate).catch(() => {});
      }
    }
  };
  peerConnections[remoteUserId] = pc;
  // Use addTransceiver for proper SDP negotiation (ensures both audio & video tracks are negotiated)
  if (localStream) {
    localStream.getTracks().forEach(track => {
      try {
        pc.addTrack(track, localStream);
      } catch (e) {
        console.warn('addTrack error:', e);
      }
    });
  }
  // Explicitly add transceivers to RECEIVE audio and video (even if we don't send video)
  // This ensures the offer/answer includes m= sections for both
  try { pc.addTransceiver('audio', { direction: 'sendrecv' }); } catch (e) { /* may already have */ }
  try {
    if (currentCall && currentCall.type === 'video') {
      pc.addTransceiver('video', { direction: 'sendrecv' });
    }
  } catch (e) { /* may already have */ }
  // ICE candidate
  pc.onicecandidate = (e) => {
    if (e.candidate) {
      sendSignal(remoteUserId, 'ice-candidate', e.candidate);
    }
  };
  // Connection state - log for debugging
  pc.onconnectionstatechange = () => {
    console.log('Connection state:', pc.connectionState, 'with', remoteUserId);
    if (pc.connectionState === 'connected') {
      toast('✅ Call connected!');
    } else if (pc.connectionState === 'failed') {
      console.error('Connection failed - likely NAT/firewall issue. TURN server needed.');
      toast('⚠️ Connection unstable - trying recovery...');
    }
  };
  // ICE connection state
  pc.oniceconnectionstatechange = () => {
    console.log('ICE state:', pc.iceConnectionState);
  };
  // Remote stream
  pc.ontrack = (e) => {
    console.log('Got remote stream:', e.streams[0]);
    const remote = document.getElementById('callRemote');
    remote.innerHTML = '';
    if (e.streams[0].getVideoTracks().length > 0) {
      // Video call - show video element
      const v = document.createElement('video');
      v.srcObject = e.streams[0];
      v.autoplay = true;
      v.playsInline = true;
      v.style.width = '100%';
      v.style.height = '100%';
      v.style.objectFit = 'cover';
      remote.appendChild(v);
    } else {
      // Voice call - show audio element + animated avatar
      const audio = document.createElement('audio');
      audio.srcObject = e.streams[0];
      audio.autoplay = true;
      audio.id = 'remoteAudio';
      document.body.appendChild(audio);  // attach to body so audio plays
      // Show animated avatar in remote area
      const avatarDiv = document.createElement('div');
      avatarDiv.className = 'call-remote-avatar';
      avatarDiv.textContent = '👤';
      avatarDiv.style.animation = 'pulse 1.5s infinite';
      remote.appendChild(avatarDiv);
    }
  };
  if (isInitiator) {
    pc.createOffer({ offerToReceiveAudio: true, offerToReceiveVideo: currentCall && currentCall.type === 'video' })
      .then(offer => {
        pc.setLocalDescription(offer);
        sendSignal(remoteUserId, 'offer', offer);
      }).catch(e => console.error('Offer error:', e));
  }
  // Store queue reference
  pc._iceQueue = iceCandidateQueue;
  return pc;
}

async function sendSignal(toUserId, type, payload) {
  if (!currentCall) return;
  await fetch(API + '/api/calls/' + currentCall.callId + '/signal', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ fromUserId: currentUser.id, toUserId, type, payload }),
  });
}

async function handleSignal(sig) {
  let pc = peerConnections[sig.fromUserId];
  if (sig.type === 'offer') {
    if (!pc) pc = createPeerConnection(sig.fromUserId, false);
    try {
      await pc.setRemoteDescription(new RTCSessionDescription(sig.payload));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      sendSignal(sig.fromUserId, 'answer', answer);
    } catch (e) {
      console.error('Offer handling error:', e);
    }
  } else if (sig.type === 'answer') {
    if (pc) {
      try { await pc.setRemoteDescription(new RTCSessionDescription(sig.payload)); } catch (e) { console.error('Answer error:', e); }
    }
  } else if (sig.type === 'ice-candidate') {
    if (pc) {
      // If remote description not set yet, queue it
      if (!pc.remoteDescription) {
        pc._iceQueue.push(new RTCIceCandidate(sig.payload));
      } else {
        try { await pc.addIceCandidate(new RTCIceCandidate(sig.payload)); } catch (e) { /* ignore */ }
      }
    }
  }
}

function toggleMute() {

async function endCall() {
  if (!currentCall) return;
  await fetch(API + '/api/calls/' + currentCall.callId + '/end', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ userId: currentUser.id }),
  });
  cleanupCall();
}

async function cleanupCall() {
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  Object.values(peerConnections).forEach(pc => pc.close());
  peerConnections = {};
  if (callTimerInterval) clearInterval(callTimerInterval);
  if (signalPollInterval) clearInterval(signalPollInterval);
  currentCall = null;
  document.getElementById('callScreen').classList.remove('show');
  document.getElementById('callLocalVideo').classList.add('hide');
  document.getElementById('callLocalVideo').srcObject = null;
  document.getElementById('callRemote').innerHTML = '<div class="call-remote-avatar">📞</div>';
  document.getElementById('muteBtn').classList.remove('active');
  document.getElementById('cameraBtn').classList.remove('active');
}

// === INCOMING CALL DETECTION ===
let lastCallCheck = 0;
async function checkForIncomingCall() {
  if (!currentUser || jitsiCall) return;
  // Throttle: only check every 5 seconds (faster for better ring experience)
  const now = Date.now();
  if (now - lastCallCheck < 5000) return;
  lastCallCheck = now;
  try {
    const res = await fetch(API + '/api/calls/active/' + currentUser.id).then(r => r.json());
    if (res.calls && res.calls.length > 0) {
      // Find a ringing call addressed to current user
      const ringing = res.calls.find(c => c.status === 'ringing' && c.toUserId === currentUser.id);
      if (ringing) {
        // Get full call details (new schema has callerName etc.)
        const detail = await fetch(API + '/api/calls/' + ringing.callId + '/status').then(r => r.json());
        if (detail.success && detail.call) {
          showIncomingCall(detail.call);
        }
      }
    }
  } catch (e) {}
}

function showIncomingCall(call) {
  const modal = document.getElementById('incomingCallModal');
  // Use callerName from the new Jitsi call schema (fallback for old format)
  const callerName = call.callerName || call.participants[0]?.name || 'Unknown';
  const callType = call.type === 'video' ? '📹 Incoming video call' : '📞 Incoming voice call';
  document.getElementById('callerName').textContent = callerName;
  document.getElementById('callerType').textContent = callType;
  // Update avatar with caller's initial
  const initial = (callerName[0] || '?').toUpperCase();
  document.getElementById('callerAvatar').textContent = initial;
  modal.classList.add('show');
  modal.dataset.callId = call.callId;
  // Play ringtone
  playRingtone();
  // Vibrate (mobile)
  if (navigator.vibrate) {
    const vibratePattern = [500, 200, 500, 200, 500];
    navigator.vibrate(vibratePattern);
  }
  // Auto-hide after 30s if not answered
  setTimeout(() => {
    if (modal.classList.contains('show') && modal.dataset.callId === call.callId) {
      modal.classList.remove('show');
      stopRingtone();
    }
  }, 30000);
}

async function acceptCall() {
  const modal = document.getElementById('incomingCallModal');
  const callId = modal.dataset.callId;
  modal.classList.remove('show');
  stopRingtone();
  if (!callId) return;
  // Accept on backend - get Jitsi URL
  const res = await fetch(API + '/api/calls/' + callId + '/accept', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ userId: currentUser.id }),
  }).then(r => r.json());
  if (!res.success) { toast('❌ ' + (res.error || 'Failed to accept')); return; }
  // Set jitsiCall and open
  jitsiCall = { callId, jitsiUrl: res.jitsiUrl, type: 'video' };
  // Get call info for title
  const statusRes = await fetch(API + '/api/calls/' + callId + '/status').then(r => r.json());
  const title = statusRes.call?.callerName || 'Call';
  openJitsiCall(res.jitsiUrl, title, callId);
  toast('✅ Call accepted');
}

async function declineCall() {
  const modal = document.getElementById('incomingCallModal');
  const callId = modal.dataset.callId;
  stopRingtone();
  if (callId) {
    await fetch(API + '/api/calls/' + callId + '/decline', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: currentUser.id }),
    });
  }
  modal.classList.remove('show');
  toast('❌ Call declined');
}

// === CALL BUTTON IN GROUP (initiate group call) ===
function showCallDeniedToast() {
  toast('❌ You are not allowed to call in this group');
}
async function startGroupCall(type) {
  if (!currentGroup) return;
  await startCall(type, null, currentGroup);
}

// Add invite + call buttons to group view
const oldOpenGroup = openGroup;
openGroup = async function(groupId) {
  currentGroup = groupId;
  nav('group');
  const res = await fetch(`${API}/api/groups/${groupId}`).then(r => r.json());
  if (!res.success) { toast('Group not found'); return; }
  const g = res.group;
  const isMember = g.members?.includes(currentUser?.id);
  const isAdmin = g.admins?.includes(currentUser?.id);
  const isOwner = g.admin === currentUser?.id;
  // Check if user can call
  const whoCanCall = g.whoCanCall || 'everyone';
  const canCall = !isMember ? false :
    whoCanCall === 'everyone' ? true :
    whoCanCall === 'admins_only' ? isAdmin :
    (g.allowedCallers || []).includes(currentUser?.id) || isAdmin;
  const callPermText = whoCanCall === 'everyone' ? '👥 All members can call' :
    whoCanCall === 'admins_only' ? '👑 Only admins can call' :
    '🎯 Specific members only';
  const content = document.getElementById('groupContent');
  content.innerHTML = `
    <div style="background:linear-gradient(135deg, ${esc(g.color || '#667eea')}, #764ba2);padding:24px 16px;border-radius:16px;margin-bottom:16px;color:#fff;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
        <div style="width:60px;height:60px;border-radius:16px;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:32px;">${esc(g.icon || '💬')}</div>
        <div style="flex:1;"><h2 style="font-size:20px;">${esc(g.name)}</h2>
          <div style="font-size:12px;opacity:0.9;">${g.memberCount || 0} members • ${g.postCount || 0} posts</div></div>
      </div>
      <p style="font-size:13px;opacity:0.95;margin:8px 0;">${esc(g.description || '')}</p>
      <div class="row">
        ${isMember ? `<button class="btn secondary" onclick="leaveGroup('${g.id}')">Leave Group</button>` :
                     `<button class="btn" onclick="joinGroup('${g.id}')">${g.type === 'private' ? 'Request to Join' : 'Join Group'}</button>`}
        ${isAdmin ? `<button class="btn secondary" onclick="openInviteCreator()">🔗 Invite Link</button>` : ''}
        ${isAdmin ? `<button class="btn secondary" onclick="openGroupSettings('${g.id}')">⚙️</button>` : ''}
      </div>
      ${isMember ? `<div class="row mt-12" style="margin-top:8px;">
        <button class="btn" style="background:${canCall ? '#4caf50' : 'rgba(255,255,255,0.2)'};" onclick="${canCall ? "startGroupCall('voice')" : "showCallDeniedToast()"}" ${canCall ? '' : 'disabled'}>📞 Voice Call</button>
        <button class="btn" style="background:${canCall ? '#9c27b0' : 'rgba(255,255,255,0.2)'};" onclick="${canCall ? "startGroupCall('video')" : "showCallDeniedToast()"}" ${canCall ? '' : 'disabled'}>📹 Video Call</button>
      </div>
      <div style="margin-top:6px;font-size:10px;opacity:0.7;">${callPermText}</div>` : ''}
      <div style="margin-top:8px;font-size:11px;opacity:0.7;">📋 Invite Code: <b>${esc(g.inviteCode || '')}</b></div>
    </div>
    <div id="groupPosts"></div>
  `;
  if (isMember) loadGroupPosts(groupId);
};

// === NOTIFICATION BADGE WITH CALL ALERTS ===
const oldLoadNotifications = loadNotifications;
loadNotifications = async function() {
  if (!currentUser) return;
  const res = await fetch(`${API}/api/notifications?userId=${currentUser.id}`).then(r => r.json());
  const list = document.getElementById('notifList');
  if (!res.notifications || res.notifications.length === 0) {
    list.innerHTML = '<div class="empty"><div class="emoji">🔔</div><div class="text">कोई notification नहीं</div></div>';
    document.getElementById('notifBadge').classList.add('hide');
    return;
  }
  const unread = res.notifications.filter(n => !n.read).length;
  if (unread > 0) {
    document.getElementById('notifBadge').textContent = unread;
    document.getElementById('notifBadge').classList.remove('hide');
  } else {
    document.getElementById('notifBadge').classList.add('hide');
  }
  list.innerHTML = res.notifications.map(n => {
    let action = '';
    if (n.type === 'incoming_call' && n.targetType === 'call') {
      action = `<button class="btn" style="margin-top:8px;padding:6px 12px;font-size:12px;" onclick="acceptCallById('${n.targetId}')">📞 Answer</button>`;
    }
    return `
      <div class="group-card" style="${n.read ? 'opacity:0.6;' : ''}">
        <div class="group-icon" style="background:rgba(102,126,234,0.3);font-size:24px;">${n.type === 'incoming_call' ? '📞' : n.type === 'group_call' ? '📢' : '🔔'}</div>
        <div class="group-info">
          <div class="group-name">${esc(n.message || n.type)}</div>
          <div class="group-meta">${timeAgo(n.createdAt)}</div>
          ${action}
        </div>
      </div>
    `;
  }).join('');
  // Mark all as read
  fetch(API + '/api/notifications/read', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ userId: currentUser.id }),
  });
};

async function acceptCallById(callId) {
  // Use the new accept endpoint to get Jitsi URL
  const res = await fetch(API + '/api/calls/' + callId + '/accept', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ userId: currentUser.id }),
  }).then(r => r.json());
  if (!res.success) { toast('❌ ' + (res.error || 'Failed')); return; }
  // Get call info for title
  const statusRes = await fetch(API + '/api/calls/' + callId + '/status').then(r => r.json());
  const title = statusRes.call?.callerName || 'Call';
  jitsiCall = { callId, jitsiUrl: res.jitsiUrl, type: statusRes.call?.type || 'video' };
  // Hide incoming modal
  document.getElementById('incomingCallModal').classList.remove('show');
  stopRingtone();
  // Open Jitsi
  openJitsiCall(res.jitsiUrl, title, callId);
  toast('✅ Call accepted');
}
</script>
