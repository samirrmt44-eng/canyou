<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0a0e1a" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>DainikState — राज्य की आवाज़ 🏆</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: #0a0e1a; color: #e4e6eb; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; overflow-x: hidden; }
  a { color: #a4b8ff; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }
  input, textarea, select { font-family: inherit; }
  img { max-width: 100%; }

  /* === HEADER === */
  header.hero {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
    color: #fff; padding: 12px 16px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
  }
  .hero-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .logo-area { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
  .logo-img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; box-shadow: 0 2px 8px rgba(0,0,0,0.3); border: 2px solid #fff; }
  .logo-text h1 { font-size: 20px; font-weight: 900; background: linear-gradient(90deg, #fff, #ffd700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .logo-text .tagline { font-size: 10px; opacity: 0.95; }
  .header-actions { display: flex; gap: 6px; }
  .header-btn {
    background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.2);
    color: #fff; width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 18px;
    position: relative; cursor: pointer;
  }
  .header-btn .badge {
    position: absolute; top: -2px; right: -2px;
    background: #ff3b30; color: #fff;
    font-size: 9px; font-weight: 800;
    min-width: 16px; height: 16px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    padding: 0 4px; border: 2px solid #764ba2;
  }
  .user-chip {
    background: rgba(255,255,255,0.2); padding: 4px 10px 4px 4px;
    border-radius: 22px; display: flex; align-items: center; gap: 6px;
    cursor: pointer; border: 1px solid rgba(255,255,255,0.2);
  }
  .user-chip .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: linear-gradient(135deg, #ffd700, #ff6b6b);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 13px; color: #fff;
  }
  .user-chip .uname { font-size: 12px; font-weight: 600; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* === BOTTOM NAV (Mobile-first) === */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(20, 20, 30, 0.98); backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255,255,255,0.1);
    display: flex; padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
    z-index: 100;
  }
  .nav-item {
    flex: 1; background: transparent; border: none; color: #888;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    padding: 6px; font-size: 10px; cursor: pointer;
  }
  .nav-item.active { color: #667eea; }
  .nav-item .icon { font-size: 22px; }
  .nav-item.center {
    transform: translateY(-8px);
  }
  .nav-item.center .icon {
    width: 50px; height: 50px; border-radius: 50%;
    background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
    color: #fff; display: flex; align-items: center; justify-content: center;
    font-size: 24px; box-shadow: 0 4px 16px rgba(255,107,107,0.5);
  }

  /* === MAIN CONTAINER === */
  .container {
    max-width: 720px; margin: 0 auto; padding: 12px 12px 80px;
  }

  /* === STORIES (Instagram-style) === */
  .stories-strip {
    display: flex; gap: 12px; padding: 12px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; margin-bottom: 16px;
    overflow-x: auto; scrollbar-width: none;
  }
  .stories-strip::-webkit-scrollbar { display: none; }
  .story-item {
    flex-shrink: 0; cursor: pointer; text-align: center;
  }
  .story-circle {
    width: 64px; height: 64px; border-radius: 50%;
    background: linear-gradient(135deg, #ff6b6b, #ee5a6f, #f093fb);
    padding: 3px; margin-bottom: 4px;
  }
  .story-circle.seen { background: rgba(255,255,255,0.2); }
  .story-circle.empty {
    background: rgba(255,255,255,0.1);
    border: 2px dashed rgba(255,255,255,0.3);
  }
  .story-circle .inner {
    width: 100%; height: 100%; border-radius: 50%;
    background: #1a1f3a;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; border: 2px solid #0a0e1a;
  }
  .story-circle .inner img { width: 100%; height: 100%; object-fit: cover; }
  .story-circle .inner .emoji { font-size: 24px; }
  .story-name { font-size: 10px; max-width: 64px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* === POST CARD (Facebook-style) === */
  .post {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; overflow: hidden; margin-bottom: 16px;
  }
  .post-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px;
  }
  .post-header .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(135deg, #ffd700, #ff6b6b);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 15px; color: #fff; flex-shrink: 0;
  }
  .post-header .avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
  .post-header .info { flex: 1; min-width: 0; }
  .post-header .name { font-weight: 700; font-size: 14px; }
  .post-header .meta { font-size: 11px; opacity: 0.6; }
  .post-menu { background: transparent; border: none; color: #fff; font-size: 18px; cursor: pointer; padding: 4px 8px; }
  .post-title { padding: 0 14px 8px; font-size: 16px; font-weight: 800; line-height: 1.4; }
  .post-text { padding: 0 14px 12px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
  .post-text.truncated {
    display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .post-text .see-more { color: #a4b8ff; cursor: pointer; font-weight: 600; }
  .platform-tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; margin-left: 4px; }
  .platform-tag.youtube { background: rgba(255, 0, 0, 0.3); color: #ff9999; }
  .platform-tag.twitter { background: rgba(29, 161, 242, 0.3); color: #99d3ff; }
  .platform-tag.odysee { background: rgba(240, 147, 251, 0.3); color: #fbcfe8; }
  .platform-tag.news { background: rgba(102, 126, 234, 0.3); color: #a4b8ff; }
  .platform-tag.web { background: rgba(255,255,255,0.1); color: #c0c0c0; }

  /* === MEDIA (full-width, in-app playback) === */
  .post-media {
    width: 100%; background: #000;
    position: relative; overflow: hidden;
  }
  .post-media img { width: 100%; height: auto; max-height: 500px; object-fit: cover; display: block; cursor: zoom-in; }
  .post-media iframe { width: 100%; aspect-ratio: 16/9; border: 0; display: block; }
  .post-media .play-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.3); cursor: pointer;
  }
  .post-media .play-overlay:hover { background: rgba(0,0,0,0.5); }
  .post-media .play-btn {
    width: 70px; height: 70px; border-radius: 50%;
    background: rgba(255,0,0,0.9);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; color: #fff;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  /* === LINK PREVIEW CARD === */
  .link-card {
    margin: 0 14px 12px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px; overflow: hidden;
    background: rgba(255,255,255,0.03);
    cursor: pointer;
  }
  .link-card .lk-image {
    width: 100%; height: 160px; object-fit: cover; background: #000;
  }
  .link-card .lk-body { padding: 10px 12px; }
  .link-card .lk-domain { font-size: 11px; color: #a4b8ff; text-transform: uppercase; }
  .link-card .lk-title { font-size: 14px; font-weight: 700; margin: 4px 0; line-height: 1.3; }
  .link-card .lk-desc { font-size: 12px; opacity: 0.7; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  /* === POLL === */
  .poll-container { padding: 0 14px 12px; }
  .poll-option {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px; padding: 10px 14px; margin-bottom: 6px;
    cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
  }
  .poll-option:hover { background: rgba(255,255,255,0.1); }
  .poll-option.voted { border-color: #667eea; background: rgba(102, 126, 234, 0.2); }
  .poll-option .bar {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: linear-gradient(90deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.3));
    z-index: 0;
  }
  .poll-option .text { position: relative; z-index: 1; display: flex; justify-content: space-between; }
  .poll-option .pct { font-weight: 700; color: #ffd700; }

  /* === REACTIONS BAR === */
  .reactions-bar {
    display: flex; align-items: center; gap: 4px;
    padding: 8px 14px; font-size: 12px; opacity: 0.8;
  }
  .reactions-bar .react-pill {
    display: inline-flex; align-items: center; gap: 3px;
    background: rgba(255,255,255,0.08); padding: 2px 8px; border-radius: 12px;
    font-size: 12px;
  }
  .reactions-bar .summary { flex: 1; }

  /* === POST ACTIONS === */
  .post-actions {
    display: grid; grid-template-columns: 1fr 1fr 1fr 1fr;
    border-top: 1px solid rgba(255,255,255,0.05);
  }
  .action-btn {
    background: transparent; border: none; color: #a4b8ff;
    padding: 10px; font-size: 13px; font-weight: 600;
    display: flex; align-items: center; justify-content: center; gap: 4px;
    cursor: pointer;
  }
  .action-btn:hover { background: rgba(255,255,255,0.05); }
  .action-btn.reacted { color: #ff6b6b; }
  .action-btn .count { font-size: 12px; }

  /* === COMMENTS PREVIEW === */
  .comments-preview {
    padding: 8px 14px 12px;
    background: rgba(0,0,0,0.15);
  }
  .comment {
    display: flex; gap: 8px; margin-bottom: 8px;
  }
  .comment .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 11px; color: #fff; flex-shrink: 0;
  }
  .comment .avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
  .comment-body { flex: 1; min-width: 0; }
  .comment .head { display: flex; gap: 6px; align-items: baseline; flex-wrap: wrap; }
  .comment .name { font-weight: 700; font-size: 13px; }
  .comment .text { font-size: 13px; line-height: 1.4; word-wrap: break-word; }
  .comment .meta { font-size: 10px; opacity: 0.6; }

  /* === MODAL/SHEET === */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 200; display: none; align-items: flex-end;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.show { display: flex; }
  .modal-sheet {
    background: #1a1f3a; border-radius: 20px 20px 0 0;
    width: 100%; max-width: 720px; margin: 0 auto;
    max-height: 90vh; overflow-y: auto;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle {
    width: 40px; height: 4px; background: rgba(255,255,255,0.3);
    border-radius: 2px; margin: 10px auto;
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px 12px; border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .modal-header h2 { font-size: 18px; }
  .modal-close {
    background: transparent; border: none; color: #fff;
    font-size: 24px; cursor: pointer; width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
  }
  .modal-close:hover { background: rgba(255,255,255,0.1); }
  .modal-body { padding: 16px; }

  /* === FORM === */
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 12px; color: #a4b8ff; margin-bottom: 4px; font-weight: 600; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; padding: 10px 12px; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 10px;
    font-size: 14px;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: #667eea; }
  .form-group textarea { min-height: 80px; resize: vertical; }
  .form-group select option { background: #1a1f3a; }
  .btn {
    width: 100%; padding: 12px; border: none; border-radius: 12px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff; box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
  }
  .btn.secondary { background: rgba(255,255,255,0.1); box-shadow: none; }
  .btn.danger { background: linear-gradient(135deg, #ff3b30, #ff6b6b); }
  .btn-row { display: flex; gap: 8px; }
  .btn-row .btn { flex: 1; }

  /* === AUTH MODAL === */
  .auth-modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.95);
    z-index: 300; display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .auth-modal.hidden { display: none; }
  .auth-box {
    background: linear-gradient(135deg, #1a1f3a, #2a1f4a);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 28px 24px;
    max-width: 440px; width: 100%; text-align: center;
  }
  .auth-logo { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 14px; display: block; border: 3px solid #ffd700; }
  .auth-box h2 {
    color: #ffd700; margin-bottom: 4px; font-size: 26px; font-weight: 900;
    background: linear-gradient(90deg, #fff, #ffd700);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .auth-box .tagline { color: #a4b8ff; font-size: 12px; margin-bottom: 18px; }
  .auth-box input, .auth-box select {
    width: 100%; padding: 11px; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 10px;
    margin-bottom: 8px; font-size: 14px; text-align: left;
  }
  .auth-box label { display: block; text-align: left; font-size: 11px; color: #a4b8ff; margin-bottom: 4px; font-weight: 600; }
  .auth-box button {
    width: 100%; padding: 12px; background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
    border: none; color: #fff; border-radius: 12px; font-size: 15px; font-weight: 700;
    cursor: pointer; margin-top: 8px;
  }

  /* === GROUP CARD === */
  .group-card {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; padding: 14px; margin-bottom: 12px;
    display: flex; gap: 12px; cursor: pointer;
  }
  .group-icon {
    width: 60px; height: 60px; border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; flex-shrink: 0;
  }
  .group-info { flex: 1; min-width: 0; }
  .group-name { font-size: 15px; font-weight: 800; margin-bottom: 2px; }
  .group-desc { font-size: 12px; opacity: 0.7; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .group-meta { font-size: 11px; opacity: 0.6; margin-top: 4px; }
  .group-tag {
    display: inline-block; padding: 2px 8px; border-radius: 8px;
    font-size: 10px; font-weight: 700; margin-right: 4px;
    background: rgba(255,255,255,0.1);
  }
  .group-tag.public { background: rgba(76, 175, 80, 0.3); color: #a5d6a7; }
  .group-tag.private { background: rgba(255, 59, 48, 0.3); color: #ff9999; }

  /* === CHAT (in group) === */
  .chat-input-bar {
    position: sticky; bottom: 56px; left: 0; right: 0;
    background: #1a1f3a; border-top: 1px solid rgba(255,255,255,0.1);
    padding: 8px 12px; display: flex; gap: 8px; align-items: center;
  }
  .chat-input-bar input {
    flex: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    color: #fff; padding: 10px 14px; border-radius: 22px; font-size: 14px;
  }
  .chat-input-bar .icon-btn {
    width: 38px; height: 38px; border-radius: 50%; border: none;
    background: rgba(255,255,255,0.1); color: #fff;
    display: flex; align-items: center; justify-content: center; font-size: 18px;
    cursor: pointer;
  }
  .chat-input-bar .send-btn {
    background: linear-gradient(135deg, #667eea, #764ba2);
  }

  /* === EMOJI PICKER === */
  .emoji-bar {
    display: flex; gap: 6px; padding: 8px 12px;
    background: #1a1f3a; border-top: 1px solid rgba(255,255,255,0.05);
    overflow-x: auto; scrollbar-width: none;
  }
  .emoji-bar::-webkit-scrollbar { display: none; }
  .emoji-bar span {
    font-size: 24px; cursor: pointer; padding: 2px;
    transition: transform 0.1s;
  }
  .emoji-bar span:hover { transform: scale(1.2); }

  /* === REACTIONS PICKER === */
  .reactions-picker {
    position: absolute; bottom: 100%; left: 0; margin-bottom: 6px;
    background: #1a1f3a; border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px; padding: 6px 8px;
    display: none; gap: 4px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .reactions-picker.show { display: flex; }
  .reactions-picker span {
    font-size: 26px; cursor: pointer; padding: 4px;
    transition: transform 0.15s;
  }
  .reactions-picker span:hover { transform: scale(1.4) translateY(-4px); }

  /* === TOAST === */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: linear-gradient(135deg, #667eea, #764ba2); color: #fff;
    padding: 10px 20px; border-radius: 24px; font-size: 13px; z-index: 500;
    opacity: 0; transition: opacity 0.3s;
  }
  .toast.show { opacity: 1; }

  /* === EMPTY STATE === */
  .empty {
    text-align: center; padding: 40px 20px;
    background: rgba(255,255,255,0.03); border: 1px dashed rgba(255,255,255,0.1);
    border-radius: 16px; margin-bottom: 16px;
  }
  .empty .emoji { font-size: 48px; margin-bottom: 8px; }
  .empty .text { font-size: 14px; opacity: 0.7; }

  /* === UTILITY === */
  .hide { display: none !important; }
  .text-center { text-align: center; }
  .row { display: flex; gap: 8px; align-items: center; }
  .grow { flex: 1; }
  .mt-12 { margin-top: 12px; }
  .mb-12 { margin-bottom: 12px; }
  .pill {
    display: inline-block; padding: 3px 10px; border-radius: 12px;
    font-size: 11px; font-weight: 600;
    background: rgba(255,255,255,0.1);
  }
  .pill.gold { background: rgba(255, 215, 0, 0.2); color: #ffd700; }
  .pill.red { background: rgba(255, 59, 48, 0.2); color: #ff6b6b; }
  .pill.green { background: rgba(76, 175, 80, 0.2); color: #a5d6a7; }

  /* === PAGES (hide/show via JS) === */
  .page { display: none; }
  .page.active { display: block; }

  /* === LIVE STREAMING === */
  .live-debug {
    position: fixed; bottom: 80px; right: 12px;
    background: rgba(0,0,0,0.85); color: #0f0;
    padding: 8px 12px; border-radius: 8px;
    font-family: monospace; font-size: 10px;
    max-width: 280px; line-height: 1.4;
    z-index: 600; border: 1px solid #0f0;
  }
  .live-banner {
    background: linear-gradient(90deg, #ff0000, #cc0000);
    color: #fff; padding: 8px 16px;
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; font-weight: 700;
    border-radius: 12px; margin-bottom: 12px;
    cursor: pointer;
  }
  .odysee-live-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255, 102, 0, 0.4);
    border-radius: 16px; overflow: hidden;
    margin-bottom: 16px;
  }
  .odysee-live-header {
    background: linear-gradient(90deg, #ff6600, #ff9900);
    color: #fff; padding: 10px 14px;
    display: flex; align-items: center; gap: 8px;
    font-weight: 700; font-size: 13px;
  }
  .odysee-live-header .live-dot {
    width: 10px; height: 10px; border-radius: 50%;

function esc(s) { return (s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function toast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), duration);
}
function timeAgo(ts) {
  if (!ts) return '';
  const d = Date.now() - ts;
  if (d < 60000) return 'अभी';
  if (d < 3600000) return Math.floor(d/60000) + ' मिनट पहले';
  if (d < 86400000) return Math.floor(d/3600000) + ' घंटे पहले';
  if (d < 7 * 86400000) return Math.floor(d/86400000) + ' दिन पहले';
  return new Date(ts).toLocaleDateString('hi-IN');
}
function formatNum(n) {
  if (!n) return '0';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return n.toString();
}

// === MEDIA HELPERS (in-app playback) ===
function getYouTubeId(url) {
  if (!url) return null;
  const m = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}
function getOdyseeId(url) {
  if (!url) return null;
  const m = url.match(/odysee\.com\/@[^:]+:([a-zA-Z0-9_-]+)/);
  return m ? m[1] : null;
}

function playMediaInline(mediaId, videoId, type) {
  const el = document.getElementById(mediaId);
  if (!el) return;
  if (type === 'youtube') {
    el.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
  } else if (type === 'odysee') {
    el.innerHTML = `<iframe src="https://odysee.com/embed/${videoId}" allowfullscreen></iframe>`;
  }
}

function expandImage(src) {

// === NAVIGATION ===
let lastNavPage = null;
function nav(page, data) {
  const isFirstVisit = lastNavPage !== page;
  currentPage = page;
  lastNavPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page)?.classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelector(`.nav-item[data-nav="${page}"]`)?.classList.add('active');
  // Only load data on first visit or if explicitly needed
  if (isFirstVisit || page === 'group' || page === 'home' && isFirstVisit) {
    if (page === 'home') loadHomeFeed();
    else if (page === 'groups') loadGroups();
    else if (page === 'explore') loadExplore();
    else if (page === 'profile') showMyProfile();
    else if (page === 'notifications') loadNotifications();
    else if (page === 'group' && data) openGroup(data);
    else if (page === 'user-profile' && data) viewUserProfile(data);
  }
  window.scrollTo(0, 0);
}

// === AUTH ===
async function checkAuth() {
  sessionId = localStorage.getItem('canyou_session');
  if (sessionId) {
    try {
      const res = await fetch(API + '/api/auth/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId }),
      });
      const data = await res.json();
      if (data.success) {
        currentUser = data.user;
        applyUserChip();
        document.getElementById('authModal').classList.add('hidden');
        // Mark pages as unvisited so nav loads them
        lastNavPage = null;
        loadHomeFeed();
        loadNotifications();
        return;
      } else {
        // Invalid session, clear it
        localStorage.removeItem('canyou_session');
        sessionId = null;
      }
    } catch (e) {
      console.warn('Auth check failed:', e);
    }
  }
  document.getElementById('authModal').classList.remove('hidden');
}

async function registerUser() {
  const name = document.getElementById('authName').value.trim();
  if (!name) { toast('कृपया अपना नाम दर्ज करें'); return; }
  const phone = document.getElementById('authPhone').value.trim();
  const state = document.getElementById('authState').value;
  const city = document.getElementById('authCity').value.trim() || 'Unknown';
  const location = `${state}, ${city}`;
  try {
    const res = await fetch(API + '/api/auth/register', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, phone, country: 'India', location }),
    });
    const data = await res.json();
    if (data.success) {
      currentUser = data.user;
      sessionId = data.sessionId;
      localStorage.setItem('canyou_session', sessionId);
      applyUserChip();
      document.getElementById('authModal').classList.add('hidden');

      if (!localStorage.getItem('ds_onboarded')) {

function applyUserChip() {

// === HOME FEED (mix of group posts + auto-imported videos) ===
let isLoadingFeed = false;
let lastFeedData = null;
async function loadHomeFeed() {
  if (isLoadingFeed) return;  // Prevent overlapping loads
  isLoadingFeed = true;
  const container = document.getElementById('homeFeed');
  const isFirstLoad = !container.querySelector('.post');
  if (isFirstLoad) {
    container.innerHTML = '<div class="empty"><div class="emoji">⏳</div><div class="text">Loading...</div></div>';
  }
  try {
    // Load user's groups posts
    const userGroups = await fetch(`${API}/api/groups?userId=${currentUser?.id || ''}`).then(r => r.json());
    const groupIds = (userGroups.groups || []).map(g => g.id);
    // Load posts from each group
    let allPosts = [];
    for (const gid of groupIds.slice(0, 5)) {
      const r = await fetch(`${API}/api/groups/${gid}/posts?userId=${currentUser?.id || ''}&limit=10`).then(r => r.json());
      allPosts = allPosts.concat((r.posts || []).map(p => ({ ...p, _group: gid })));
    }
    // Also add auto-imported channel links (existing system)
    const links = await fetch(`${API}/api/links?source=channel&limit=10`).then(r => r.json());
    const autoPosts = (links.links || []).map(l => ({
      id: l.id, type: 'auto', _group: 'channels',
      text: l.title, mediaUrl: l.thumbnail, linkUrl: l.url, linkTitle: l.title,
      linkDescription: l.description, linkImage: l.thumbnail,
      user: { name: l.addedBy, avatar: '' }, createdAt: l.addedAt,
      reactionCount: 0, commentCount: l.commentCount || 0, viewCount: 0,
      platform: l.platform, _autoLink: l,
    }));
    allPosts = allPosts.concat(autoPosts);
    allPosts.sort((a, b) => b.createdAt - a.createdAt);
    // Only load stories on first load
    if (isFirstLoad) loadStories();
    // Load active live streams from user's groups
    if (currentUser) loadLiveNowSection();
    // Load Odysee live streams (always, even for non-logged-in)
    loadOdyseeLiveSection();
    if (allPosts.length === 0) {
      container.innerHTML = '<div class="empty"><div class="emoji">👋</div><div class="text">अभी कोई पोस्ट नहीं है।<br>कोई ग्रुप join करें या खुद का बनाएं!</div></div>';
      lastFeedData = [];
      return;
    }
    // Smart render: only re-render if data actually changed
    const newDataStr = JSON.stringify(allPosts.map(p => ({ id: p.id, c: p.commentCount, r: p.reactionCount, t: p.createdAt })));
    if (!isFirstLoad && lastFeedData === newDataStr) {
      // No changes - skip render
      return;
    }
    lastFeedData = newDataStr;
    container.innerHTML = allPosts.map(p => renderPost(p)).join('');
    // Track new videos for auto-pause
    setTimeout(scanForNewMedia, 100);
  } catch (e) {
    if (isFirstLoad) {
      container.innerHTML = '<div class="empty"><div class="emoji">❌</div><div class="text">Failed to load feed</div></div>';
    }
    console.error(e);
  } finally {
    isLoadingFeed = false;
  }
}

// === ODYSEE LIVE STREAM EMBED ===
async function loadOdyseeLiveSection() {
  const section = document.getElementById('odyseeLiveSection');
  if (!section) return;
  try {
    // Check if we already have manually added streams - if so, just append auto-detected ones
    let saved = [];
    try { saved = JSON.parse(localStorage.getItem('ds_odysee_manual_streams') || '[]'); } catch (e) {}
    const res = await fetch(API + '/api/odysee/live').then(r => r.json());
    if (!res.streams || res.streams.length === 0) {
      // No auto-detected, but if we have manual, keep them visible
      if (saved.length === 0) {
        section.classList.add('hide');
        section.innerHTML = '';
      }
      return;
    }
    section.classList.remove('hide');
    // Auto-detected streams
    const autoHtml = `
      <h3 style="margin:8px 0 8px 0;font-size:14px;display:flex;align-items:center;gap:6px;">
        <span class="live-dot" style="background:#ff6600;"></span> ODYSEE LIVE NOW
        <span style="font-size:11px;opacity:0.6;margin-left:auto;">via Odysee</span>
      </h3>
      ${res.streams.map(s => `
        <div class="odysee-live-card">
          <div class="odysee-live-header">
            <span class="live-dot"></span>
            <span style="flex:1;">🔴 ${esc(s.channelName || s.channelHandle)}</span>
            <span style="font-size:11px;opacity:0.9;">👁 ${s.views || 0}</span>
            <a href="${esc(s.url)}" target="_blank" rel="noopener" style="color:#fff;text-decoration:none;background:rgba(0,0,0,0.2);padding:4px 10px;border-radius:6px;font-size:11px;margin-left:6px;">Open on Odysee ↗</a>
          </div>
          <iframe class="odysee-embed" src="${esc(s.embedUrl)}" allow="autoplay; fullscreen" allowfullscreen referrerpolicy="no-referrer"></iframe>
          <div class="odysee-info">
            <div class="title">${esc(s.title)}</div>
            <div class="channel">@${esc(s.channelHandle)}</div>
          </div>
        </div>
      `).join('')}
    `;
    // If we have manual streams, keep them and append auto-detected
    if (saved.length > 0) {
      // Manually render the combined view
      let manualHtml = `
        <h3 style="margin:8px 0 8px 0;font-size:14px;display:flex;align-items:center;gap:6px;">
          <span class="live-dot" style="background:#ff6600;"></span> ODYSEE LIVE NOW
          <span style="font-size:11px;opacity:0.6;margin-left:auto;">${saved.length} manually added • <a href="#" onclick="event.preventDefault();clearManualOdyseeStreams();" style="color:#ff9999;">clear</a></span>
        </h3>
      `;
      saved.forEach((stream, idx) => {
        const correctEmbedUrl = `https://odysee.com/$/embed/${stream.name}:${stream.claimId || 'a'}`;
        manualHtml += `
          <div class="odysee-live-card" data-idx="${idx}">
            <div class="odysee-live-header">
              <span class="live-dot"></span>
              <span style="flex:1;">🔴 ${esc(stream.channelName || stream.channelHandle || stream.name)}</span>
              <a href="${esc(stream.url)}" target="_blank" rel="noopener" style="color:#fff;text-decoration:none;background:rgba(0,0,0,0.2);padding:4px 10px;border-radius:6px;font-size:11px;margin-left:6px;">Open on Odysee ↗</a>
              <button onclick="removeManualOdyseeStream(${idx})" style="background:rgba(0,0,0,0.2);border:none;color:#fff;padding:4px 8px;border-radius:6px;font-size:11px;margin-left:4px;cursor:pointer;">✕</button>
            </div>
            <iframe class="odysee-embed" src="${esc(correctEmbedUrl)}" allow="autoplay; fullscreen" allowfullscreen referrerpolicy="no-referrer"></iframe>
            <div class="odysee-info">
              <div class="title">${esc(stream.title)}</div>
              <div class="channel">@${esc(stream.channelHandle || stream.name.split('/')[0])}</div>
            </div>
          </div>
        `;
      });
      // Append auto-detected below
      section.innerHTML = manualHtml + autoHtml;
    } else {
      section.innerHTML = autoHtml;
    }
  } catch (e) { console.error('Odysee live error:', e); }
}

async function submitAddOdyseeStreamUrl() {

    closeModal();

    toast('✅ Live stream added! Reload-safe ab (localStorage me save ho gaya).');
  } else {
    toast('❌ ' + (res.error || 'Failed'));
  }

// Show a single Odysee stream directly (manual added) - PERSISTED in localStorage
function showOdyseeStreamDirect(stream) {
  // Save to localStorage so it persists across reloads
  try {
    const saved = JSON.parse(localStorage.getItem('ds_odysee_manual_streams') || '[]');
    // Avoid duplicates by claimId+name
    const exists = saved.find(s => s.claimId === stream.claimId && s.name === stream.name);
    if (!exists) {
      saved.unshift(stream);
      localStorage.setItem('ds_odysee_manual_streams', JSON.stringify(saved));
    }
  } catch (e) { console.warn('localStorage save failed:', e); }
  renderManualOdyseeStreams();
}

// Render all manually added streams (from localStorage)
function renderManualOdyseeStreams() {
  let saved = [];
  try {
    saved = JSON.parse(localStorage.getItem('ds_odysee_manual_streams') || '[]');
  } catch (e) { saved = []; }
  if (!saved || saved.length === 0) return;
  const section = document.getElementById('odyseeLiveSection');
  nav('home');
  section.classList.remove('hide');
  // Header with clear-all button
  let html = `
    <h3 style="margin:8px 0 8px 0;font-size:14px;display:flex;align-items:center;gap:6px;">
      <span class="live-dot" style="background:#ff6600;"></span> ODYSEE LIVE NOW
      <span style="font-size:11px;opacity:0.6;margin-left:auto;">${saved.length} manually added • <a href="#" onclick="event.preventDefault();clearManualOdyseeStreams();" style="color:#ff9999;">clear</a></span>
    </h3>
  `;
  saved.forEach((stream, idx) => {
    // Build the correct embed URL - Odysee format: https://odysee.com/$/embed/<name>:<claimid>
    // stream.name is like @DainikState:1/cripto-panda, stream.claimId is like 'a'
    // Correct embed: https://odysee.com/$/embed/@DainikState:1/cripto-panda:a
    const correctEmbedUrl = `https://odysee.com/$/embed/${stream.name}:${stream.claimId || 'a'}`;
    html += `
      <div class="odysee-live-card" data-idx="${idx}">
        <div class="odysee-live-header">
          <span class="live-dot"></span>
          <span style="flex:1;">🔴 ${esc(stream.channelName || stream.channelHandle || stream.name)}</span>
          <a href="${esc(stream.url)}" target="_blank" rel="noopener" style="color:#fff;text-decoration:none;background:rgba(0,0,0,0.2);padding:4px 10px;border-radius:6px;font-size:11px;margin-left:6px;">Open on Odysee ↗</a>
          <button onclick="removeManualOdyseeStream(${idx})" style="background:rgba(0,0,0,0.2);border:none;color:#fff;padding:4px 8px;border-radius:6px;font-size:11px;margin-left:4px;cursor:pointer;">✕</button>
        </div>
        <iframe class="odysee-embed" src="${esc(correctEmbedUrl)}" allow="autoplay; fullscreen" allowfullscreen referrerpolicy="no-referrer"></iframe>
        <div class="odysee-info">
          <div class="title">${esc(stream.title)}</div>
          <div class="channel">@${esc(stream.channelHandle || stream.name.split('/')[0])}</div>
        </div>
      </div>
    `;
  });
  section.innerHTML = html;
  // Also hide the auto-detected Odysee section if manual is shown (avoid duplicates)
  // Actually, we'll let auto-detected one show below manual ones
}

function removeManualOdyseeStream(idx) {
  if (!confirm('Remove this embedded stream?')) return;
  let saved = [];
  try { saved = JSON.parse(localStorage.getItem('ds_odysee_manual_streams') || '[]'); } catch (e) {}
  saved.splice(idx, 1);
  localStorage.setItem('ds_odysee_manual_streams', JSON.stringify(saved));
  if (saved.length === 0) {
    document.getElementById('odyseeLiveSection').classList.add('hide');
    document.getElementById('odyseeLiveSection').innerHTML = '';
  } else {
    renderManualOdyseeStreams();
  }
  toast('Removed');
}

function clearManualOdyseeStreams() {
  if (!confirm('Remove all manually added Odysee streams?')) return;
  localStorage.removeItem('ds_odysee_manual_streams');
  document.getElementById('odyseeLiveSection').classList.add('hide');
  document.getElementById('odyseeLiveSection').innerHTML = '';

// === POST RENDERING (Facebook-style, in-app playback) ===
function renderPost(p) {
  const user = p.user || { name: 'User', avatar: '' };
  const avatar = user.avatar ?
    `<img src="${esc(user.avatar)}" alt="" />` :
    (user.name[0] || 'U').toUpperCase();
  let media = '';
  // Detect media
  const ytId = p.linkUrl ? getYouTubeId(p.linkUrl) : null;
  const odyseeId = p.linkUrl ? getOdyseeId(p.linkUrl) : null;
  const mediaId = 'media-' + p.id;
  if (p.type === 'image' && p.mediaUrl) {
    media = `<div class="post-media"><img src="${esc(p.mediaUrl)}" loading="lazy" onclick="expandImage('${esc(p.mediaUrl)}')" /></div>`;
  } else if (p.type === 'video' && p.mediaUrl) {
    media = `<div class="post-media"><video src="${esc(p.mediaUrl)}" controls playsinline style="width:100%;"></video></div>`;
  } else if (p.type === 'gif' && p.mediaUrl) {
    media = `<div class="post-media"><img src="${esc(p.mediaUrl)}" loading="lazy" /></div>`;
  } else if (p.type === 'voice' && p.voiceUrl) {
    media = `<div style="padding:12px 14px;"><audio controls src="${esc(p.voiceUrl)}" style="width:100%;"></audio></div>`;
  } else if (p.type === 'live' && p.liveStreamId) {
    // Live stream post - clickable to join
    media = `<div class="post-media" style="background:linear-gradient(135deg,#1a0000,#000);cursor:pointer;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;" onclick="joinLiveStream('${p.liveStreamId}')">
      <div style="text-align:center;color:#fff;">
        <div style="width:80px;height:80px;border-radius:50%;background:rgba(255,0,0,0.9);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:32px;box-shadow:0 4px 20px rgba(255,0,0,0.5);">🔴</div>
        <div style="font-size:18px;font-weight:800;">LIVE NOW</div>
        <div style="font-size:12px;opacity:0.7;margin-top:4px;">Click to watch</div>
      </div>
      <div style="position:absolute;top:8px;left:8px;background:rgba(255,0,0,0.9);padding:3px 8px;border-radius:4px;font-size:10px;font-weight:800;color:#fff;">🔴 LIVE</div>
    </div>`;
  } else if (ytId) {
    media = `<div class="post-media" id="${mediaId}">
      <div class="play-overlay" onclick="playMediaInline('${mediaId}','${ytId}','youtube')">
        <div class="play-btn">▶</div>
      </div>
      <img src="https://i.ytimg.com/vi/${ytId}/hqdefault.jpg" loading="lazy" />
    </div>`;
  } else if (odyseeId) {
    media = `<div class="post-media" id="${mediaId}">
      <div class="play-overlay" onclick="playMediaInline('${mediaId}','${odyseeId}','odysee')">
        <div class="play-btn">▶</div>
      </div>
      <img src="${esc(p.mediaUrl || p.linkImage || '')}" loading="lazy" onerror="this.style.display='none'" />
    </div>`;
  } else if (p.mediaUrl && (p.type === 'auto' || p.type === 'mixed')) {
    media = `<div class="post-media"><img src="${esc(p.mediaUrl)}" loading="lazy" onclick="expandImage('${esc(p.mediaUrl)}')" /></div>`;
  }
  // Link card
  let linkCard = '';
  if (p.linkUrl && p.type !== 'image' && p.type !== 'video' && !ytId && !odyseeId) {
    linkCard = `
      <div class="link-card" onclick="window.open('${esc(p.linkUrl)}','_blank')">
        ${p.linkImage ? `<img src="${esc(p.linkImage)}" class="lk-image" onerror="this.style.display='none'" />` : ''}
        <div class="lk-body">
          <div class="lk-domain">🌐 ${esc(extractDomain(p.linkUrl))}</div>
          <div class="lk-title">${esc(p.linkTitle || p.linkUrl)}</div>
          ${p.linkDescription ? `<div class="lk-desc">${esc(p.linkDescription)}</div>` : ''}
        </div>
      </div>`;
  }
  // Poll
  let poll = '';
  if (p.type === 'poll' && p.pollOptions) {
    const totalVotes = p.pollOptions.reduce((s, o) => s + (o.votes?.length || 0), 0);
    poll = `<div class="poll-container">${p.pollOptions.map(o => {
      const votes = o.votes?.length || 0;
      const pct = totalVotes > 0 ? Math.round((votes / totalVotes) * 100) : 0;
      const voted = o.votes?.includes(currentUser?.id);
      return `<div class="poll-option ${voted ? 'voted' : ''}" onclick="votePoll('${p.id}','${o.id}')">
        <div class="bar" style="width:${pct}%"></div>
        <div class="text"><span>${voted ? '✅ ' : ''}${esc(o.text)}</span><span class="pct">${pct}%</span></div>
      </div>`;
    }).join('')}<div style="font-size:11px;opacity:0.6;margin-top:6px;">${totalVotes} votes</div></div>`;
  }
  // Reactions summary
  const r = p.reactions || {};
  const reactionPills = [];
  if (r.like) reactionPills.push(`<span class="react-pill">👍 ${r.like}</span>`);
  if (r.love) reactionPills.push(`<span class="react-pill">❤️ ${r.love}</span>`);
  if (r.laugh) reactionPills.push(`<span class="react-pill">😂 ${r.laugh}</span>`);
  if (r.wow) reactionPills.push(`<span class="react-pill">😮 ${r.wow}</span>`);
  if (r.sad) reactionPills.push(`<span class="react-pill">😢 ${r.sad}</span>`);
  if (r.angry) reactionPills.push(`<span class="react-pill">😡 ${r.angry}</span>`);
  const reactionsHtml = reactionPills.length > 0 ?
    `<div class="reactions-bar">${reactionPills.join('')}<div class="summary">${formatNum(p.commentCount || 0)} comments • ${formatNum(p.viewCount || 0)} views</div></div>` :
    `<div class="reactions-bar"><div class="summary">${formatNum(p.commentCount || 0)} comments</div></div>`;
  return `
    <div class="post" data-id="${p.id}">
      <div class="post-header">
        <div class="avatar">${avatar}</div>
        <div class="info">
          <div class="name">${esc(user.name)} ${p.platform ? `<span class="platform-tag ${p.platform}">${p.platform}</span>` : ''}</div>
          <div class="meta">${timeAgo(p.createdAt)} ${p._group && p._group !== 'channels' ? '• 👥 ' + esc(p._group).slice(0, 20) : ''}</div>
        </div>
        <button class="post-menu" onclick="showPostMenu('${p.id}','${p._group || ''}')">⋯</button>
      </div>
      ${p.text ? `<div class="post-text">${esc(p.text)}</div>` : ''}
      ${media}
      ${linkCard}
      ${poll}
      ${reactionsHtml}
      <div class="post-actions">
        <button class="action-btn" onclick="showReactionsPicker(event, '${p.id}','${p._group || ''}')">👍 Like</button>
        <button class="action-btn" onclick="openCommentSheet('${p.id}','${p._group || ''}')">💬 Comment</button>
        <button class="action-btn" onclick="sharePost('${esc(p.linkUrl || p.mediaUrl || '')}')">↗ Share</button>
        <button class="action-btn" onclick="repost('${p.id}')">🔁 Repost</button>
      </div>
    </div>`;
}

let recordedVoiceUrl = null;
async function recordVoiceForPost() {
  const btn = document.getElementById('voiceRecBtn');
  const status = document.getElementById('voiceStatus');
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    btn.textContent = '🎤 Start Recording';
    status.textContent = 'Recording saved';
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = () => {
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      const reader = new FileReader();
      reader.onload = ev => { recordedVoiceUrl = ev.target.result; status.textContent = '✅ Voice ready (' + Math.round(blob.size/1024) + 'KB)'; };
      reader.readAsDataURL(blob);
      stream.getTracks().forEach(t => t.stop());
    };
    mediaRecorder.start();
    btn.textContent = '⏹ Stop Recording';
    status.textContent = '🔴 Recording...';
  } catch (e) { toast('Microphone access denied'); }
}

async function submitPost() {
  if (!currentUser) return;
  const type = document.getElementById('postType').value;
  const text = document.getElementById('postText').value.trim();
  const groupId = document.getElementById('postGroup').value;
  if (!text && type === 'text') { toast('Write something'); return; }
  const payload = { userId: currentUser.id, type, text };
  if (type === 'image' || type === 'video' || type === 'gif') {
    payload.mediaUrl = document.getElementById('postMediaUrl').value.trim();
  } else if (type === 'link') {
    payload.linkUrl = document.getElementById('postLinkUrl').value.trim();
  } else if (type === 'poll') {
    const options = document.getElementById('pollOptions').value.split('\n').map(s => s.trim()).filter(Boolean);
    payload.pollOptions = options.map((o, i) => ({ id: 'opt_' + i, text: o, votes: [] }));
  } else if (type === 'voice') {
    payload.voiceUrl = recordedVoiceUrl;
  }
  let url;
  if (groupId) {
    url = API + '/api/groups/' + groupId + '/posts';
  } else {
    // Post to general feed (treat as link post for now)
    if (type === 'link' && payload.linkUrl) {
      url = API + '/api/links';
      payload.url = payload.linkUrl;
      delete payload.linkUrl; delete payload.type;
    } else {
      toast('Please select a group to post this type');
      return;
    }
  }
  const res = await fetch(url, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  const data = await res.json();
  if (data.success) {
    closeModal();
    toast('✅ Posted!');
    loadHomeFeed();
  } else {
    toast('❌ ' + (data.error || 'Failed'));
  }
}

    `${API}/api/groups?userId=${currentUser.id}&memberOnly=true&sort=lastActivity` :
    `${API}/api/groups?userId=${currentUser.id}&sort=popular&limit=50`;
  const res = await fetch(url).then(r => r.json());
  if (currentGroupFilter === 'discover' || currentGroupFilter === 'public' || currentGroupFilter === 'school' || currentGroupFilter === 'news') {
    // Use explore endpoint
    const explore = await fetch(API + '/api/explore').then(r => r.json());
    const groups = (explore.trendingGroups || []).filter(g => currentGroupFilter === 'discover' || currentGroupFilter === 'public' || g.category === currentGroupFilter);
    renderGroupsList(groups);
    return;
  }
  renderGroupsList(res.groups || []);
}

function renderGroupsList(groups) {
  const list = document.getElementById('groupsList');
  if (groups.length === 0) {
    list.innerHTML = '<div class="empty"><div class="emoji">👥</div><div class="text">कोई ग्रुप नहीं मिला।<br>नया ग्रुप बनाएं या search करें!</div></div>';
    return;
  }
  list.innerHTML = groups.map(g => {
    const isAdminUser = currentUser && (g.admin === currentUser.id || (g.admins || []).includes(currentUser.id));
    return `
    <div class="group-card" onclick="openGroup('${g.id}')">
      <div class="group-icon" style="background:${esc(g.color || '#667eea')};">${esc(g.icon || '💬')}</div>
      <div class="group-info">
        <div class="group-name">${esc(g.name)} <span class="group-tag ${g.type}">${g.type === 'public' ? '🌐 Public' : '🔒 Private'}</span></div>
        <div class="group-desc">${esc(g.description || 'No description')}</div>
        <div class="group-meta">👥 ${g.memberCount || 0} members • ${g.postCount || 0} posts${isAdminUser ? ' • 👑 You are admin' : ''}</div>
        ${isAdminUser ? `<button class="btn" style="margin-top:8px;background:linear-gradient(135deg,#ff0000,#cc0000);font-size:12px;padding:8px;" onclick="event.stopPropagation();startGoLive('${g.id}')">🔴 Go Live in this Group</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

function setGroupFilter(f) {
  currentGroupFilter = f;
  document.querySelectorAll('[data-grp-filter]').forEach(b => {
    b.classList.remove('active');
    b.style.background = 'rgba(255,255,255,0.05)';

  document.querySelector(`[data-grp-filter="${f}"]`)?.classList.add('active');

  loadGroups();
}

async function createGroup() {
  const name = document.getElementById('grpName').value.trim();
  if (!name) { toast('Group name required'); return; }
  const payload = {
    userId: currentUser.id, name,
    description: document.getElementById('grpDesc').value.trim(),
    icon: document.getElementById('grpIcon').value || '💬',
    color: document.getElementById('grpColor').value,
    type: document.getElementById('grpType').value,
    category: document.getElementById('grpCategory').value,
    whoCanPost: document.getElementById('grpWhoPost').value,
  };
  const res = await fetch(API + '/api/groups', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  const data = await res.json();
  if (data.success) {
    closeModal();
    toast('✅ Group created!');
    loadGroups();
    setTimeout(() => openGroup(data.group.id), 500);
  } else {
    toast('❌ ' + (data.error || 'Failed'));
  }
}

async function openGroup(groupId) {
  currentGroup = groupId;
  nav('group');
  const res = await fetch(`${API}/api/groups/${groupId}?userId=${currentUser?.id}`).then(r => r.json());
  if (!res.success) { toast('Group not found'); return; }
  const g = res.group;
  const isMember = g.members?.includes(currentUser?.id);
  const isAdmin = g.admins?.includes(currentUser?.id);
  const isOwner = g.admin === currentUser?.id;
  const content = document.getElementById('groupContent');
  content.innerHTML = `
    <div style="background:linear-gradient(135deg, ${esc(g.color || '#667eea')}, #764ba2);padding:24px 16px;border-radius:16px;margin-bottom:16px;color:#fff;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
        <div style="width:60px;height:60px;border-radius:16px;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:32px;">${esc(g.icon || '💬')}</div>
        <div style="flex:1;"><h2 style="font-size:20px;">${esc(g.name)}</h2>
          <div style="font-size:12px;opacity:0.9;">${g.memberCount || 0} members • ${g.postCount || 0} posts</div></div>
      </div>
      <p style="font-size:13px;opacity:0.95;margin:8px 0;">${esc(g.description || '')}</p>
      <div class="row">

      </div>
      ${(isAdmin || isOwner) ? `
      <div class="row mt-12" style="margin-top:8px;">
        <button class="btn go-live-btn" style="background:linear-gradient(135deg,#ff0000,#cc0000);flex:1;font-weight:800;" onclick="startGoLive('${g.id}')">🔴 Go Live (Screen Share / Camera / Audio)</button>
      </div>
      <div class="row mt-12" style="margin-top:8px;">
        <button class="btn secondary" style="flex:1;" onclick="openInviteCreator()">🔗 Invite Link</button>

      </div>
      ` : (isMember ? `
      <div class="row mt-12" style="margin-top:8px;">
        <button class="btn secondary" style="flex:1;" onclick="joinGroup('${g.id}')">📡 Watching for live streams</button>

      <div style="margin-top:8px;font-size:11px;opacity:0.7;">📋 Invite Code: <b>${esc(g.inviteCode || '')}</b></div>

  `;
  if (isMember) {
    loadGroupPosts(groupId);
    checkActiveLive(g.id);
  }
}

async function checkActiveLive(groupId) {
  try {
    const res = await fetch(API + '/api/groups/' + groupId + '/live/active').then(r => r.json());
    const banner = document.getElementById('activeLiveBanner');
    if (res.streams && res.streams.length > 0) {
      const stream = res.streams[0];
      banner.innerHTML = `
        <div class="live-banner" onclick="joinLiveStream('${stream.streamId}')">
          <span class="live-dot"></span>
          <span>🔴 LIVE NOW</span>
          <span style="flex:1;opacity:0.9;">${esc(stream.title)}</span>
          <span>👁 ${stream.viewerCount || 0} watching</span>
          <span style="background:rgba(255,255,255,0.2);padding:2px 8px;border-radius:6px;">Join →</span>
        </div>
      `;
    } else {
      banner.innerHTML = '';
    }
  } catch (e) {}
}

async function loadGroupPosts(groupId) {
  const container = document.getElementById('groupPosts');
  container.innerHTML = '<div class="empty"><div class="text">Loading posts...</div></div>';
  const res = await fetch(`${API}/api/groups/${groupId}/posts?userId=${currentUser?.id}&limit=20`).then(r => r.json());
  if (res.posts.length === 0) {
    container.innerHTML = '<div class="empty"><div class="emoji">📝</div><div class="text">अभी कोई post नहीं है। पहला post करें!</div></div>';
    return;
  }
  container.innerHTML = res.posts.map(p => renderPost(p)).join('');
  setTimeout(scanForNewMedia, 100);
}

async function joinGroup(groupId) {
  if (!currentUser) return;
  const res = await fetch(`${API}/api/groups/${groupId}/join`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ userId: currentUser.id }),
  });
  const data = await res.json();
  if (data.success) {
    toast(data.pending ? '⏳ Request sent to admin' : '✅ Joined!');
    openGroup(groupId);
  } else {
    toast('❌ ' + (data.error || 'Failed'));
  }
}

async function leaveGroup(groupId) {
  if (!confirm('Leave this group?')) return;
  await fetch(`${API}/api/groups/${groupId}/leave`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ userId: currentUser.id }),
  });
  toast('Left group');
  nav('groups');
}

function openGroupSettings(groupId) {
  showModal('Group Settings', `

    <button class="btn secondary mb-12" onclick="openCallPermissions('${groupId}')">📞 Call Permissions</button>

async function openCallPermissions(groupId) {
  const res = await fetch(API + '/api/groups/' + groupId).then(r => r.json());
  if (!res.success) return;
  const g = res.group;
  const current = g.whoCanCall || 'everyone';
  showModal('📞 Call Permissions', `
    <p style="opacity:0.7;font-size:13px;margin-bottom:12px;">Choose who can start voice/video calls in this group.</p>
    <div class="form-group">
      <label>Who can call?</label>
      <select id="callPerm" onchange="updateCallPerm()">
        <option value="everyone" ${current === 'everyone' ? 'selected' : ''}>👥 Everyone (all members)</option>
        <option value="admins_only" ${current === 'admins_only' ? 'selected' : ''}>👑 Only Admins</option>
        <option value="specific" ${current === 'specific' ? 'selected' : ''}>🎯 Specific Members (you choose)</option>
      </select>
    </div>
    <p style="font-size:11px;opacity:0.6;margin-top:8px;" id="callPermHelp">Anyone in the group can start calls.</p>
    <button class="btn mt-12" onclick="saveCallPermissions('${groupId}')">Save</button>
  `);
}

function updateCallPerm() {
  const v = document.getElementById('callPerm').value;
  const help = document.getElementById('callPermHelp');
  if (v === 'everyone') help.textContent = 'Anyone in the group can start calls.';
  else if (v === 'admins_only') help.textContent = 'Only admins and the owner can start calls.';
  else help.textContent = 'Choose specific members from the next screen.';
}

async function saveCallPermissions(groupId) {
  const whoCanCall = document.getElementById('callPerm').value;
  const res = await fetch(API + '/api/groups/' + groupId + '/settings', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ adminId: currentUser.id, whoCanCall }),
  }).then(r => r.json());
  if (res.success) {
    toast('✅ Call permissions updated');
    if (whoCanCall === 'specific') {
      closeModal();
      setTimeout(() => openManageCallers(groupId), 300);
    } else {
      closeModal();
    }
  } else {
    toast('❌ ' + (res.error || 'Failed'));
  }
}

async function openManageCallers(groupId) {
  const res = await fetch(API + '/api/groups/' + groupId + '/members').then(r => r.json());
  if (!res.success) return;
  const g = await fetch(API + '/api/groups/' + groupId).then(r => r.json());
  const allowed = g.group.allowedCallers || [];
  const whoCanCall = g.group.whoCanCall || 'everyone';
  showModal('🎤 Manage Callers', `
    <p style="opacity:0.7;font-size:13px;margin-bottom:12px;">
      ${whoCanCall === 'specific' ? 'Select who can call in this group:' : 'Currently: ' + (whoCanCall === 'everyone' ? 'Everyone can call' : 'Only admins can call')}
    </p>
    <div id="callersList" style="max-height: 50vh; overflow-y: auto;">
      ${res.members.map(m => {
        const isAllowed = whoCanCall === 'everyone' ||
                          (whoCanCall === 'admins_only' && m.isAdmin) ||
                          (whoCanCall === 'specific' && (allowed.includes(m.id) || m.isAdmin));
        const canModify = !m.isOwner && (m.isAdmin || whoCanCall !== 'admins_only');
        return `
        <div style="display:flex;align-items:center;gap:10px;padding:10px;background:rgba(255,255,255,0.05);border-radius:10px;margin-bottom:6px;">
          <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#ffd700,#ff6b6b);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0;">
            ${m.avatar ? `<img src="${esc(m.avatar)}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" />` : esc((m.name||'?')[0])}
          </div>
          <div style="flex:1;min-width:0;">
            <div style="font-weight:700;font-size:13px;">${esc(m.name)} ${m.isOwner ? '👑' : m.isAdmin ? '⭐' : ''}</div>
            <div style="font-size:11px;opacity:0.6;">📍 ${esc(m.location || 'Unknown')}</div>
          </div>
          ${m.isOwner ? '<span class="pill gold">Owner</span>' :
            m.isAdmin ? '<span class="pill">Admin</span>' :
            whoCanCall === 'specific' ?
              `<button class="btn" style="padding:6px 12px;font-size:12px;width:auto;${isAllowed ? '' : 'background:rgba(255,255,255,0.1);'}" onclick="toggleCaller('${groupId}','${m.id}', ${isAllowed})">${isAllowed ? '✅ Allowed' : '➕ Allow'}</button>` :
              (isAllowed ? '<span class="pill green">Can Call</span>' : '<span class="pill">No</span>')}
        </div>`;
      }).join('')}
    </div>
    ${whoCanCall !== 'specific' ? `<button class="btn mt-12" onclick="openCallPermissions('${groupId}')">⚙️ Change Mode</button>` : ''}
  `);
}

async function toggleCaller(groupId, userId, currentlyAllowed) {
  const res = await fetch(API + '/api/groups/' + groupId + '/allow-caller', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ userId, adminId: currentUser.id, action: currentlyAllowed ? 'remove' : 'add' }),
  }).then(r => r.json());
  if (res.success) {
    toast(currentlyAllowed ? '❌ Removed' : '✅ Allowed');
    openManageCallers(groupId);
  } else {
    toast('❌ ' + (res.error || 'Failed'));
  }
}

  document.getElementById('exploreUsers').innerHTML = (res.users || []).map(u => renderUserCard(u)).join('') ||

async function loadOnlineUsers() {
  // Use users endpoint with sort by recent
  const res = await fetch(API + '/api/users?limit=30').then(r => r.json());
  // Filter users active in last 5 minutes
  const fiveMinAgo = Date.now() - 5 * 60 * 1000;
  const onlineUsers = (res.users || []).filter(u => (u.lastSeen || 0) > fiveMinAgo);
  document.getElementById('exploreOnline').innerHTML = onlineUsers.length > 0
    ? onlineUsers.map(u => renderUserCard(u, true)).join('')
    : '<div class="empty"><div class="emoji">💤</div><div class="text">Abhi koi online nahi hai.<br>Aap pehle aayein, doosre bhi aayenge!</div></div>';

let lastNotificationsData = null;
let lastNotificationsFetch = 0;
async function loadNotifications() {
  if (!currentUser) return;
  const now = Date.now();
  if (now - lastNotificationsFetch < 5000 && lastNotificationsData !== null) return;
  lastNotificationsFetch = now;
  try {
    const res = await fetch(`${API}/api/notifications?userId=${currentUser.id}`).then(r => r.json());
    const newDataStr = JSON.stringify(res.notifications?.map(n => ({ id: n.id, read: n.read, msg: n.message })) || []);
    const list = document.getElementById('notifList');
    if (newDataStr === lastNotificationsData && list.innerHTML && !list.innerHTML.includes('empty')) {
      return;
    }
    lastNotificationsData = newDataStr;
    if (!res.notifications || res.notifications.length === 0) {
      list.innerHTML = '<div class="empty"><div class="emoji">🔔</div><div class="text">कोई notification नहीं</div></div>';
      document.getElementById('notifBadge').classList.add('hide');
      return;
    }
    const unread = res.notifications.filter(n => !n.read).length;
    if (unread > 0) {
      document.getElementById('notifBadge').textContent = unread;
      document.getElementById('notifBadge').classList.remove('hide');
    } else {
      document.getElementById('notifBadge').classList.add('hide');
    }
    list.innerHTML = res.notifications.map(n => {
      let action = '';
      if (n.type === 'incoming_call' && n.targetType === 'call') {
        action = `<button class="btn" style="margin-top:8px;padding:6px 12px;font-size:12px;" onclick="acceptCallById('${n.targetId}')">📞 Answer</button>`;
      }
      return `
        <div class="group-card" style="${n.read ? 'opacity:0.6;' : ''}">
          <div class="group-icon" style="background:rgba(102,126,234,0.3);font-size:24px;">${n.type === 'incoming_call' ? '📞' : n.type === 'group_call' ? '📢' : '🔔'}</div>
          <div class="group-info">
            <div class="group-name">${esc(n.message || n.type)}</div>
            <div class="group-meta">${timeAgo(n.createdAt)}</div>
            ${action}
          </div>
        </div>
      `;
    }).join('');
    fetch(API + '/api/notifications/read', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: currentUser.id }),
    });
  } catch (e) { console.error('Notif error:', e); }
}

let liveStream = null;
let liveLocalStream = null;
let livePeerConnections = {};
let liveSignalPoll = null;
let liveChatPoll = null;

// Live debug overlay (for troubleshooting)
function retryLiveConnection() {
  if (!liveStream) return;
  updateLiveDebug('Manual retry requested...');
  // Reset peer connections
  Object.values(livePeerConnections).forEach(pc => pc.close());
  livePeerConnections = {};
  // Force streamer to send new offer
  if (liveStream.streamerId === currentUser.id) {
    // Streamer: re-send offers to all viewers
    streamerCheckViewers();
    // If stream is missing, re-acquire
    if (!liveLocalStream || !liveLocalStream.active) {
      reAcquireLocalStream();
    }
  } else {
    // Viewer: force a signal poll
    pollLiveSignals();
  }
  toast('🔄 Retrying connection...');
}

async function reAcquireLocalStream() {
  if (!liveStream) return;
  updateLiveDebug('Re-acquiring local stream...');
  toast('📹 Please grant camera/mic/screen permission again');
  const type = liveStream.type || 'camera';
  try {
    if (type === 'screen') {
      liveLocalStream = await navigator.mediaDevices.getDisplayMedia({ video: { cursor: 'always' }, audio: true });
    } else if (type === 'audio') {
      liveLocalStream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
    } else {
      liveLocalStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    }
    // Show in local video
    const v = document.getElementById('live-remote-video');
    if (v) {
      v.srcObject = liveLocalStream;
      v.muted = true;
    }
    updateLiveDebug('✅ Local stream re-acquired');
    // Re-setup peer connections for all viewers
    streamerCheckViewers();
  } catch (e) {
    updateLiveDebug('❌ Failed to acquire stream: ' + e.message);
    toast('❌ Permission denied - cannot continue stream');
  }
}

async function confirmGoLive(groupId) {
  const title = document.getElementById('liveTitle').value.trim() || currentUser.name + ' is live!';
  const description = document.getElementById('liveDesc').value.trim();
  const type = document.getElementById('liveType').value;

  // Get media based on type
  try {
    if (type === 'screen') {
      // Screen share - get display media
      liveLocalStream = await navigator.mediaDevices.getDisplayMedia({
        video: { cursor: 'always', displaySurface: 'browser' },
        audio: true  // Try to capture tab audio
      });
      toast('🖥️ Screen sharing started!');
    } else if (type === 'both') {
      // Camera + Screen simultaneously
      const [cameraStream, screenStream] = await Promise.all([
        navigator.mediaDevices.getUserMedia({ video: true, audio: true }),
        navigator.mediaDevices.getDisplayMedia({ video: { cursor: 'always' }, audio: true })
      ]);
      // Combine: take video from screen, audio from camera (better audio quality)
      const combinedStream = new MediaStream();
      screenStream.getVideoTracks().forEach(t => combinedStream.addTrack(t));
      cameraStream.getAudioTracks().forEach(t => combinedStream.addTrack(t));
      liveLocalStream = combinedStream;
    } else if (type === 'audio') {
      liveLocalStream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
    } else {
      // camera (default)
      liveLocalStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    }
  } catch (e) {
    console.error('Media error:', e);
    if (e.name === 'NotAllowedError') {
      toast('❌ Permission denied - click again and allow');
    } else if (e.name === 'NotFoundError') {
      toast('❌ No camera/mic/screen found');
    } else {
      toast('❌ Error: ' + e.message);
    }
    return;
  }

  // Now start the stream on backend
  const res = await fetch(API + '/api/groups/' + groupId + '/live/start', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ userId: currentUser.id, title, description, type }),
  }).then(r => r.json());
  if (!res.success) {
    // Don't release local stream — user might want to retry
    // Only release on explicit end
    const errorMsg = res.error || 'Failed';
    if (errorMsg.includes('already active')) {
      toast('❌ Group me pehle se ek live stream hai. End karein pehle!');
    } else {
      toast('❌ ' + errorMsg);
    }
    if (liveLocalStream) { liveLocalStream.getTracks().forEach(t => t.stop()); liveLocalStream = null; }
    return;
  }
  liveStream = res.stream;
  closeModal();
  toast('🔴 You are LIVE!');
  // Open the live stream view as streamer
  showLiveStreamView(liveStream, true);
  startLiveSignaling();
  startLiveChatPolling();
}

function startLiveSignaling() {
  if (liveSignalPoll) clearInterval(liveSignalPoll);
  // Initial rapid polling for first 10 seconds (every 400ms)
  // Then slower polling (every 1500ms) to save bandwidth
  let fastPollCount = 0;
  const fastPoll = () => {
    pollLiveSignals();
    fastPollCount++;
    if (fastPollCount < 25) {  // ~10 seconds
      setTimeout(fastPoll, 400);
    } else {
      // Switch to slower polling
      liveSignalPoll = setInterval(pollLiveSignals, 1500);
    }
  };
  fastPoll();
  // Also check for new viewers every 1 sec (for streamer) - faster!
  if (liveStream && liveStream.streamerId === currentUser.id) {
    setInterval(streamerCheckViewers, 1000);
  }
}

async function pollLiveSignals() {
  if (!liveStream || !currentUser) return;
  // If we're the streamer, also poll call status to update viewer count
  const isStreamer = liveStream.streamerId === currentUser.id;
  // BOTH streamer and viewer should poll signals addressed to them
  const sigRes = await fetch(API + '/api/live/' + liveStream.streamId + '/signals/' + currentUser.id).then(r => r.json());
  // Re-check after async (liveStream could have been cleared during await)
  if (!liveStream || !currentUser) return;
  if (sigRes.signals) {
    for (const sig of sigRes.signals) {
      // Re-check before each signal
      if (!liveStream) break;
      await handleLiveSignal(sig);
    }
  }
  // Re-check again
  if (!liveStream || !currentUser) return;
  if (isStreamer) {
    const res = await fetch(API + '/api/live/active?userId=' + currentUser.id).then(r => r.json());
    if (!liveStream || !currentUser) return;
    const s = (res.streams || []).find(x => x.streamId === liveStream.streamId);
    if (s) {
      const viewerSpan = document.getElementById('liveViewerCount');
      if (viewerSpan) viewerSpan.textContent = s.viewerCount || 0;
      liveStream = s;
    }
  }
  // Re-poll stream status (check if ended)
  const allRes = await fetch(API + '/api/live/active?userId=' + currentUser.id).then(r => r.json());
  if (!liveStream || !currentUser) return;
  const stillLive = (allRes.streams || []).find(s => s.streamId === liveStream.streamId);
  if (!stillLive && !isStreamer) {
    toast('📺 Stream ended');
    leaveLiveStream();
  }
}

async function handleLiveSignal(sig) {
  // For viewer: receive offer from streamer and send back answer
  if (sig.type === 'offer') {
    updateLiveDebug('📥 Got offer from streamer');
    let pc = livePeerConnections[sig.fromUserId];
    if (!pc) pc = createLivePeerConnection(sig.fromUserId);
    try {
      await pc.setRemoteDescription(new RTCSessionDescription(sig.payload));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      sendLiveSignal(sig.fromUserId, 'answer', answer);
      updateLiveDebug('✅ Answer sent to streamer');
    } catch (e) {
      console.error('Live offer error:', e);
      updateLiveDebug('❌ Offer error: ' + e.message);
    }
  } else if (sig.type === 'answer') {
    const pc = livePeerConnections[sig.fromUserId];
    if (pc) {
      try {
        await pc.setRemoteDescription(new RTCSessionDescription(sig.payload));
        updateLiveDebug('✅ Answer received');
      } catch (e) {
        console.error('Live answer error:', e);
        updateLiveDebug('❌ Answer error: ' + e.message);
      }
    }
  } else if (sig.type === 'ice-candidate') {
    const pc = livePeerConnections[sig.fromUserId];
    if (pc) {
      try { await pc.addIceCandidate(new RTCIceCandidate(sig.payload)); } catch (e) { /* ignore */ }
    }
  }
}

function sendLiveSignal(toUserId, type, payload) {
  if (!liveStream) return;
  fetch(API + '/api/live/' + liveStream.streamId + '/signal', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ fromUserId: currentUser.id, toUserId, type, payload }),
  });
}

function createLivePeerConnection(remoteUserId) {
  updateLiveDebug('Creating peer connection...');
  const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
  livePeerConnections[remoteUserId] = pc;
  // Streamer: add local stream
  if (liveLocalStream) {
    liveLocalStream.getTracks().forEach(track => pc.addTrack(track, liveLocalStream));
  }
  // Add transceivers for viewer (ensure we receive audio+video)
  try { pc.addTransceiver('audio', { direction: 'sendrecv' }); } catch (e) {}
  try { pc.addTransceiver('video', { direction: 'sendrecv' }); } catch (e) {}
  pc.onicecandidate = (e) => {
    if (e.candidate) sendLiveSignal(remoteUserId, 'ice-candidate', e.candidate);
  };
  pc.onconnectionstatechange = () => {
    updateLiveDebug(`State: ${pc.connectionState}`);
    updateLiveConnStatus('Connection: ' + pc.connectionState);
    if (pc.connectionState === 'connected') {
      toast('🔴 Connected to live stream!');
      updateLiveConnStatus('✅ Connected! Video should be playing.');
      showLiveRetry(false);
    } else if (pc.connectionState === 'failed') {
      updateLiveDebug('❌ Connection failed - need TURN server');
      updateLiveConnStatus('❌ Failed - same network pe try karein ya TURN setup karein');
      toast('⚠️ Connection failed - check network');
      showLiveRetry(true);
    } else if (pc.connectionState === 'disconnected' || pc.connectionState === 'closed') {
      showLiveRetry(true);
    }
  };
  pc.ontrack = (e) => {
    updateLiveDebug(`🎬 Got stream: ${e.streams[0].getVideoTracks().length}v ${e.streams[0].getAudioTracks().length}a`);
    // For viewer: receive streamer's video/audio
    const v = document.getElementById('live-remote-video');
    const ph = document.getElementById('live-placeholder');
    const ov = document.getElementById('live-overlay');
    if (v) {
      v.style.display = 'block';
      v.srcObject = e.streams[0];
      v.muted = false;
      v.play().catch(e => console.warn('Video play error:', e));
      if (ph) ph.style.display = 'none';
      if (ov) ov.style.display = 'flex';
    }
    // For audio-only streams
    if (e.streams[0].getAudioTracks().length > 0 && e.streams[0].getVideoTracks().length === 0) {
      const audio = document.createElement('audio');
      audio.srcObject = e.streams[0];
      audio.autoplay = true;
      audio.id = 'live-audio-' + Date.now();
      document.body.appendChild(audio);
    }
    toast('🔴 Connected to live stream');
  };
  return pc;
}

// Streamer: when new viewer joins, send them an offer
async function setupStreamerForViewer(viewerUserId) {
  if (!liveLocalStream || !liveLocalStream.active) {
    updateLiveDebug('⚠️ No active local stream — viewer waiting');
    updateLiveConnStatus('❌ Local stream not available');
    return;  // Don't send offer if no local stream
  }
  updateLiveDebug(`Setting up peer for viewer ${viewerUserId.slice(0,6)}...`);
  const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
  livePeerConnections[viewerUserId] = pc;
  liveLocalStream.getTracks().forEach(track => pc.addTrack(track, liveLocalStream));
  try { pc.addTransceiver('audio', { direction: 'sendrecv' }); } catch (e) {}
  try { pc.addTransceiver('video', { direction: 'sendrecv' }); } catch (e) {}
  pc.onicecandidate = (e) => {
    if (e.candidate) {
      updateLiveDebug(`ICE candidate → ${viewerUserId.slice(0,6)}`);
      sendLiveSignal(viewerUserId, 'ice-candidate', e.candidate);
    }
  };
  pc.onconnectionstatechange = () => {
    updateLiveDebug(`State: ${pc.connectionState} w/ ${viewerUserId.slice(0,6)}`);
  };
  try {
    const offer = await pc.createOffer({ offerToReceiveAudio: true, offerToReceiveVideo: true });
    await pc.setLocalDescription(offer);
    sendLiveSignal(viewerUserId, 'offer', offer);
    updateLiveDebug(`✅ Offer sent to ${viewerUserId.slice(0,6)}`);
  } catch (e) {
    console.error('Streamer offer error:', e);
    updateLiveDebug('❌ Offer error: ' + e.message);
  }
}

// Polling - detect new viewers and send them offers
async function streamerCheckViewers() {
  if (!liveStream || liveStream.streamerId !== currentUser.id) return;
  try {
    const res = await fetch(API + '/api/live/active?userId=' + currentUser.id).then(r => r.json());
    const s = (res.streams || []).find(x => x.streamId === liveStream.streamId);
    if (!s) return;
    // For each viewer not yet connected, send offer immediately
    for (const viewerId of (s.viewers || [])) {
      if (viewerId === currentUser.id) continue;
      if (!livePeerConnections[viewerId]) {
        console.log('Sending offer to new viewer:', viewerId);
        setupStreamerForViewer(viewerId);
      }
    }
  } catch (e) { console.error('streamerCheckViewers error:', e); }
}

// === AUTO-PAUSE VIDEOS WHEN OUT OF VIEWPORT ===
// Tracks all <video> and YouTube <iframe> elements, pauses when scrolled off-screen
let videoObserver = null;
let autoPausedVideos = new WeakSet();  // Videos we auto-paused (so user can manually resume)
const videoTrackingMap = new Map();  // element -> { type, id, lastState }

function initVideoObserver() {
  if (videoObserver) return;
  videoObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const el = entry.target;
      const meta = videoTrackingMap.get(el);
      if (!meta) return;
      if (!entry.isIntersecting || entry.intersectionRatio < 0.5) {
        // Video is < 50% visible - pause it
        pauseMediaElement(el, meta);
      } else {
        // Video is visible - don't auto-resume (respect user's pause)
        // But if WE auto-paused it, we could resume
        if (autoPausedVideos.has(el)) {
          resumeMediaElement(el, meta);
        }
      }
    });
  }, {
    threshold: [0, 0.25, 0.5, 0.75, 1.0],
    rootMargin: '0px'
  });
}

function pauseMediaElement(el, meta) {
  if (meta.type === 'video') {
    if (el && !el.paused && el.readyState > 2) {
      autoPausedVideos.add(el);
      el.pause();
    }
  } else if (meta.type === 'youtube') {
    // YouTube iframe - send pause message
    try {
      el.contentWindow?.postMessage(JSON.stringify({
        event: 'command',
        func: 'pauseVideo',
        args: ''
      }), '*');
    } catch (e) { /* ignore */ }
  } else if (meta.type === 'odysee') {
    try {
      el.contentWindow?.postMessage(JSON.stringify({
        method: 'pause'
      }), '*');
    } catch (e) { /* ignore */ }
  }
  // Show visual indicator
  showPauseIndicator(el);
}

function resumeMediaElement(el, meta) {
  if (meta.type === 'video') {
    if (el && el.paused && autoPausedVideos.has(el)) {
      el.play().catch(() => {});
      autoPausedVideos.delete(el);
    }
  } else if (meta.type === 'youtube') {
    try {
      el.contentWindow?.postMessage(JSON.stringify({
        event: 'command',
        func: 'playVideo',
        args: ''
      }), '*');
    } catch (e) { /* ignore */ }
  }
  hidePauseIndicator(el);
}

function showPauseIndicator(el) {
  const wrapper = el.closest('.post-media, .call-videos');
  if (!wrapper) return;
  let indicator = wrapper.querySelector('.video-paused-overlay');
  if (!indicator) {
    indicator = document.createElement('div');
    indicator.className = 'video-paused-overlay';
    indicator.innerHTML = '<div class="play-icon">▶</div><div style="color:#fff;margin-top:8px;font-size:12px;opacity:0.8;">Tap to resume</div>';
    // Make clickable to resume
    indicator.style.pointerEvents = 'auto';
    indicator.style.cursor = 'pointer';
    indicator.onclick = () => {
      const meta = videoTrackingMap.get(el);
      if (meta) resumeMediaElement(el, meta);
      hidePauseIndicator(el);
    };
    wrapper.appendChild(indicator);
  }
  indicator.classList.add('show');
}

function hidePauseIndicator(el) {
  const wrapper = el.closest('.post-media, .call-videos');
  if (!wrapper) return;
  const indicator = wrapper.querySelector('.video-paused-overlay');
  if (indicator) indicator.classList.remove('show');
}

// Track a new video/iframe element
function trackMediaElement(el, type, id) {
  if (!videoObserver) initVideoObserver();
  videoTrackingMap.set(el, { type, id });
  videoObserver.observe(el);
}

// Untrack element (call this when removing from DOM)
function untrackMediaElement(el) {
  if (videoObserver) videoObserver.unobserve(el);
  videoTrackingMap.delete(el);
}

// Scan DOM for new media (call after content updates)
function scanForNewMedia() {
  // Track all <video> in posts that aren't already tracked
  document.querySelectorAll('.post-media video, .post-media iframe').forEach(el => {
    if (!videoTrackingMap.has(el)) {
      let type = 'video';
      let id = el.src || Math.random().toString(36).slice(2);
      if (el.tagName === 'IFRAME') {
        if (el.src.includes('youtube')) type = 'youtube';
        else if (el.src.includes('odysee')) type = 'odysee';
      }
      trackMediaElement(el, type, id);
    }
  });
}
