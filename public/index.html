<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0a0e1a" />
<title>DainikState — राज्य की आवाज़ 🏆</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: #0a0e1a; color: #e4e6eb; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; overflow-x: hidden; }
  a { color: #a4b8ff; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }
  input, textarea, select { font-family: inherit; }
  img { max-width: 100%; }

  /* === HEADER === */
  header.hero {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
    color: #fff; padding: 12px 16px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
  }
  .hero-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .logo-area { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
  .logo-img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; box-shadow: 0 2px 8px rgba(0,0,0,0.3); border: 2px solid #fff; }
  .logo-text h1 { font-size: 20px; font-weight: 900; background: linear-gradient(90deg, #fff, #ffd700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .logo-text .tagline { font-size: 10px; opacity: 0.95; }
  .header-actions { display: flex; gap: 6px; }
  .header-btn {
    background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.2);
    color: #fff; width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 18px;
    position: relative; cursor: pointer;
  }
  .header-btn .badge {
    position: absolute; top: -2px; right: -2px;
    background: #ff3b30; color: #fff;
    font-size: 9px; font-weight: 800;
    min-width: 16px; height: 16px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    padding: 0 4px; border: 2px solid #764ba2;
  }
  .user-chip {
    background: rgba(255,255,255,0.2); padding: 4px 10px 4px 4px;
    border-radius: 22px; display: flex; align-items: center; gap: 6px;
    cursor: pointer; border: 1px solid rgba(255,255,255,0.2);
  }
  .user-chip .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: linear-gradient(135deg, #ffd700, #ff6b6b);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 13px; color: #fff;
  }
  .user-chip .uname { font-size: 12px; font-weight: 600; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* === BOTTOM NAV (Mobile-first) === */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(20, 20, 30, 0.98); backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255,255,255,0.1);
    display: flex; padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
    z-index: 100;
  }
  .nav-item {
    flex: 1; background: transparent; border: none; color: #888;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    padding: 6px; font-size: 10px; cursor: pointer;
  }
  .nav-item.active { color: #667eea; }
  .nav-item .icon { font-size: 22px; }
  .nav-item.center {
    transform: translateY(-8px);
  }
  .nav-item.center .icon {
    width: 50px; height: 50px; border-radius: 50%;
    background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
    color: #fff; display: flex; align-items: center; justify-content: center;
    font-size: 24px; box-shadow: 0 4px 16px rgba(255,107,107,0.5);
  }

  /* === MAIN CONTAINER === */
  .container {
    max-width: 720px; margin: 0 auto; padding: 12px 12px 80px;
  }

  /* === STORIES (Instagram-style) === */
  .stories-strip {
    display: flex; gap: 12px; padding: 12px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; margin-bottom: 16px;
    overflow-x: auto; scrollbar-width: none;
  }
  .stories-strip::-webkit-scrollbar { display: none; }
  .story-item {
    flex-shrink: 0; cursor: pointer; text-align: center;
  }
  .story-circle {
    width: 64px; height: 64px; border-radius: 50%;
    background: linear-gradient(135deg, #ff6b6b, #ee5a6f, #f093fb);
    padding: 3px; margin-bottom: 4px;
  }
  .story-circle.seen { background: rgba(255,255,255,0.2); }
  .story-circle.empty {
    background: rgba(255,255,255,0.1);
    border: 2px dashed rgba(255,255,255,0.3);
  }
  .story-circle .inner {
    width: 100%; height: 100%; border-radius: 50%;
    background: #1a1f3a;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; border: 2px solid #0a0e1a;
  }
  .story-circle .inner img { width: 100%; height: 100%; object-fit: cover; }
  .story-circle .inner .emoji { font-size: 24px; }
  .story-name { font-size: 10px; max-width: 64px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* === POST CARD (Facebook-style) === */
  .post {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; overflow: hidden; margin-bottom: 16px;
  }
  .post-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px;
  }
  .post-header .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(135deg, #ffd700, #ff6b6b);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 15px; color: #fff; flex-shrink: 0;
  }
  .post-header .avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
  .post-header .info { flex: 1; min-width: 0; }
  .post-header .name { font-weight: 700; font-size: 14px; }
  .post-header .meta { font-size: 11px; opacity: 0.6; }
  .post-menu { background: transparent; border: none; color: #fff; font-size: 18px; cursor: pointer; padding: 4px 8px; }
  .post-title { padding: 0 14px 8px; font-size: 16px; font-weight: 800; line-height: 1.4; }
  .post-text { padding: 0 14px 12px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
  .post-text.truncated {
    display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .post-text .see-more { color: #a4b8ff; cursor: pointer; font-weight: 600; }
  .platform-tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; margin-left: 4px; }
  .platform-tag.youtube { background: rgba(255, 0, 0, 0.3); color: #ff9999; }
  .platform-tag.twitter { background: rgba(29, 161, 242, 0.3); color: #99d3ff; }
  .platform-tag.odysee { background: rgba(240, 147, 251, 0.3); color: #fbcfe8; }
  .platform-tag.news { background: rgba(102, 126, 234, 0.3); color: #a4b8ff; }
  .platform-tag.web { background: rgba(255,255,255,0.1); color: #c0c0c0; }

  /* === MEDIA (full-width, in-app playback) === */
  .post-media {
    width: 100%; background: #000;
    position: relative; overflow: hidden;
  }
  .post-media img { width: 100%; height: auto; max-height: 500px; object-fit: cover; display: block; cursor: zoom-in; }
  .post-media iframe { width: 100%; aspect-ratio: 16/9; border: 0; display: block; }
  .post-media .play-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.3); cursor: pointer;
  }
  .post-media .play-overlay:hover { background: rgba(0,0,0,0.5); }
  .post-media .play-btn {
    width: 70px; height: 70px; border-radius: 50%;
    background: rgba(255,0,0,0.9);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; color: #fff;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  /* === LINK PREVIEW CARD === */
  .link-card {
    margin: 0 14px 12px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px; overflow: hidden;
    background: rgba(255,255,255,0.03);
    cursor: pointer;
  }
  .link-card .lk-image {
    width: 100%; height: 160px; object-fit: cover; background: #000;
  }
  .link-card .lk-body { padding: 10px 12px; }
  .link-card .lk-domain { font-size: 11px; color: #a4b8ff; text-transform: uppercase; }
  .link-card .lk-title { font-size: 14px; font-weight: 700; margin: 4px 0; line-height: 1.3; }
  .link-card .lk-desc { font-size: 12px; opacity: 0.7; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  /* === POLL === */
  .poll-container { padding: 0 14px 12px; }
  .poll-option {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px; padding: 10px 14px; margin-bottom: 6px;
    cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
  }
  .poll-option:hover { background: rgba(255,255,255,0.1); }
  .poll-option.voted { border-color: #667eea; background: rgba(102, 126, 234, 0.2); }
  .poll-option .bar {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: linear-gradient(90deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.3));
    z-index: 0;
  }
  .poll-option .text { position: relative; z-index: 1; display: flex; justify-content: space-between; }
  .poll-option .pct { font-weight: 700; color: #ffd700; }

  /* === REACTIONS BAR === */
  .reactions-bar {
    display: flex; align-items: center; gap: 4px;
    padding: 8px 14px; font-size: 12px; opacity: 0.8;
  }
  .reactions-bar .react-pill {
    display: inline-flex; align-items: center; gap: 3px;
    background: rgba(255,255,255,0.08); padding: 2px 8px; border-radius: 12px;
    font-size: 12px;
  }
  .reactions-bar .summary { flex: 1; }

  /* === POST ACTIONS === */
  .post-actions {
    display: grid; grid-template-columns: 1fr 1fr 1fr 1fr;
    border-top: 1px solid rgba(255,255,255,0.05);
  }
  .action-btn {
    background: transparent; border: none; color: #a4b8ff;
    padding: 10px; font-size: 13px; font-weight: 600;
    display: flex; align-items: center; justify-content: center; gap: 4px;
    cursor: pointer;
  }
  .action-btn:hover { background: rgba(255,255,255,0.05); }
  .action-btn.reacted { color: #ff6b6b; }
  .action-btn .count { font-size: 12px; }

  /* === COMMENTS PREVIEW === */
  .comments-preview {
    padding: 8px 14px 12px;
    background: rgba(0,0,0,0.15);
  }
  .comment {
    display: flex; gap: 8px; margin-bottom: 8px;
  }
  .comment .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 11px; color: #fff; flex-shrink: 0;
  }
  .comment .avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
  .comment-body { flex: 1; min-width: 0; }
  .comment .head { display: flex; gap: 6px; align-items: baseline; flex-wrap: wrap; }
  .comment .name { font-weight: 700; font-size: 13px; }
  .comment .text { font-size: 13px; line-height: 1.4; word-wrap: break-word; }
  .comment .meta { font-size: 10px; opacity: 0.6; }

  /* === MODAL/SHEET === */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 200; display: none; align-items: flex-end;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.show { display: flex; }
  .modal-sheet {
    background: #1a1f3a; border-radius: 20px 20px 0 0;
    width: 100%; max-width: 720px; margin: 0 auto;
    max-height: 90vh; overflow-y: auto;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle {
    width: 40px; height: 4px; background: rgba(255,255,255,0.3);
    border-radius: 2px; margin: 10px auto;
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px 12px; border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .modal-header h2 { font-size: 18px; }
  .modal-close {
    background: transparent; border: none; color: #fff;
    font-size: 24px; cursor: pointer; width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
  }
  .modal-close:hover { background: rgba(255,255,255,0.1); }
  .modal-body { padding: 16px; }

  /* === FORM === */
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 12px; color: #a4b8ff; margin-bottom: 4px; font-weight: 600; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; padding: 10px 12px; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 10px;
    font-size: 14px;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: #667eea; }
  .form-group textarea { min-height: 80px; resize: vertical; }
  .form-group select option { background: #1a1f3a; }
  .btn {
    width: 100%; padding: 12px; border: none; border-radius: 12px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff; box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
  }
  .btn.secondary { background: rgba(255,255,255,0.1); box-shadow: none; }
  .btn.danger { background: linear-gradient(135deg, #ff3b30, #ff6b6b); }
  .btn-row { display: flex; gap: 8px; }
  .btn-row .btn { flex: 1; }

  /* === AUTH MODAL === */
  .auth-modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.95);
    z-index: 300; display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .auth-modal.hidden { display: none; }
  .auth-box {
    background: linear-gradient(135deg, #1a1f3a, #2a1f4a);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 28px 24px;
    max-width: 440px; width: 100%; text-align: center;
  }
  .auth-logo { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 14px; display: block; border: 3px solid #ffd700; }
  .auth-box h2 {
    color: #ffd700; margin-bottom: 4px; font-size: 26px; font-weight: 900;
    background: linear-gradient(90deg, #fff, #ffd700);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .auth-box .tagline { color: #a4b8ff; font-size: 12px; margin-bottom: 18px; }
  .auth-box input, .auth-box select {
    width: 100%; padding: 11px; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 10px;
    margin-bottom: 8px; font-size: 14px; text-align: left;
  }
  .auth-box label { display: block; text-align: left; font-size: 11px; color: #a4b8ff; margin-bottom: 4px; font-weight: 600; }
  .auth-box button {
    width: 100%; padding: 12px; background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
    border: none; color: #fff; border-radius: 12px; font-size: 15px; font-weight: 700;
    cursor: pointer; margin-top: 8px;
  }

  /* === GROUP CARD === */
  .group-card {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; padding: 14px; margin-bottom: 12px;
    display: flex; gap: 12px; cursor: pointer;
  }
  .group-icon {
    width: 60px; height: 60px; border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; flex-shrink: 0;
  }
  .group-info { flex: 1; min-width: 0; }
  .group-name { font-size: 15px; font-weight: 800; margin-bottom: 2px; }
  .group-desc { font-size: 12px; opacity: 0.7; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .group-meta { font-size: 11px; opacity: 0.6; margin-top: 4px; }
  .group-tag {
    display: inline-block; padding: 2px 8px; border-radius: 8px;
    font-size: 10px; font-weight: 700; margin-right: 4px;
    background: rgba(255,255,255,0.1);
  }
  .group-tag.public { background: rgba(76, 175, 80, 0.3); color: #a5d6a7; }
  .group-tag.private { background: rgba(255, 59, 48, 0.3); color: #ff9999; }

  /* === CHAT (in group) === */
  .chat-input-bar {
    position: sticky; bottom: 56px; left: 0; right: 0;
    background: #1a1f3a; border-top: 1px solid rgba(255,255,255,0.1);
    padding: 8px 12px; display: flex; gap: 8px; align-items: center;
  }
  .chat-input-bar input {
    flex: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    color: #fff; padding: 10px 14px; border-radius: 22px; font-size: 14px;
  }
  .chat-input-bar .icon-btn {
    width: 38px; height: 38px; border-radius: 50%; border: none;
    background: rgba(255,255,255,0.1); color: #fff;
    display: flex; align-items: center; justify-content: center; font-size: 18px;
    cursor: pointer;
  }
  .chat-input-bar .send-btn {
    background: linear-gradient(135deg, #667eea, #764ba2);
  }

  /* === EMOJI PICKER === */
  .emoji-bar {
    display: flex; gap: 6px; padding: 8px 12px;
    background: #1a1f3a; border-top: 1px solid rgba(255,255,255,0.05);
    overflow-x: auto; scrollbar-width: none;
  }
  .emoji-bar::-webkit-scrollbar { display: none; }
  .emoji-bar span {
    font-size: 24px; cursor: pointer; padding: 2px;
    transition: transform 0.1s;
  }
  .emoji-bar span:hover { transform: scale(1.2); }

  /* === REACTIONS PICKER === */
  .reactions-picker {
    position: absolute; bottom: 100%; left: 0; margin-bottom: 6px;
    background: #1a1f3a; border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px; padding: 6px 8px;
    display: none; gap: 4px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .reactions-picker.show { display: flex; }
  .reactions-picker span {
    font-size: 26px; cursor: pointer; padding: 4px;
    transition: transform 0.15s;
  }
  .reactions-picker span:hover { transform: scale(1.4) translateY(-4px); }

  /* === TOAST === */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: linear-gradient(135deg, #667eea, #764ba2); color: #fff;
    padding: 10px 20px; border-radius: 24px; font-size: 13px; z-index: 500;
    opacity: 0; transition: opacity 0.3s;
  }
  .toast.show { opacity: 1; }

  /* === EMPTY STATE === */
  .empty {
    text-align: center; padding: 40px 20px;
    background: rgba(255,255,255,0.03); border: 1px dashed rgba(255,255,255,0.1);
    border-radius: 16px; margin-bottom: 16px;
  }
  .empty .emoji { font-size: 48px; margin-bottom: 8px; }
  .empty .text { font-size: 14px; opacity: 0.7; }

  /* === UTILITY === */
  .hide { display: none !important; }
  .text-center { text-align: center; }
  .row { display: flex; gap: 8px; align-items: center; }
  .grow { flex: 1; }
  .mt-12 { margin-top: 12px; }
  .mb-12 { margin-bottom: 12px; }
  .pill {
    display: inline-block; padding: 3px 10px; border-radius: 12px;
    font-size: 11px; font-weight: 600;
    background: rgba(255,255,255,0.1);
  }
  .pill.gold { background: rgba(255, 215, 0, 0.2); color: #ffd700; }
  .pill.red { background: rgba(255, 59, 48, 0.2); color: #ff6b6b; }
  .pill.green { background: rgba(76, 175, 80, 0.2); color: #a5d6a7; }

  /* === PAGES (hide/show via JS) === */
  .page { display: none; }
  .page.active { display: block; }
</style>
</head>
<body>

<header class="hero">
  <div class="hero-top">
    <div class="logo-area" onclick="nav('home')">
      <img src="/images/logo.png" alt="DainikState" class="logo-img" id="headerLogo" />
      <div class="logo-text">
        <h1>DainikState</h1>
        <div class="tagline">🏆 राज्य की आवाज़, राज्य की ताकत</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="header-btn" onclick="nav('notifications')" title="Notifications">
        🔔 <span class="badge hide" id="notifBadge">0</span>
      </button>
      <div class="user-chip hide" id="userChip" onclick="showMyProfile()">
        <div class="avatar" id="uAvatar">U</div>
        <div class="uname" id="uName">User</div>
      </div>
    </div>
  </div>
</header>

<div class="container">

  <!-- HOME PAGE -->
  <div class="page active" id="page-home">
    <div class="stories-strip" id="storiesStrip">
      <div class="story-item" onclick="openStoryComposer()">
        <div class="story-circle empty"><div class="inner"><div class="emoji">➕</div></div></div>
        <div class="story-name">Your Story</div>
      </div>
    </div>

    <div id="homeFeed"><div class="empty"><div class="emoji">📭</div><div class="text">Loading feed...</div></div></div>
  </div>

  <!-- GROUPS PAGE -->

  <span onclick="reactWith('like')">👍</span>

  <span onclick="reactWith('sad')">😢</span>
  <span onclick="reactWith('angry')">😡</span>
</div>

<div class="toast" id="toast"></div>

<script>
/* ====================================================
   DainikState - राज्य की आवाज़, राज्य की ताकत
   WhatsApp killer + Social media + News
   ==================================================== */
const API = '';
let currentUser = null;
let sessionId = null;
let currentPage = 'home';
let currentGroup = null;
let currentGroupFilter = 'joined';
let mediaRecorder = null;
let audioChunks = [];
let currentReactTarget = null;

function esc(s) { return (s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function toast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), duration);
}
function timeAgo(ts) {
  if (!ts) return '';
  const d = Date.now() - ts;
  if (d < 60000) return 'अभी';
  if (d < 3600000) return Math.floor(d/60000) + ' मिनट पहले';
  if (d < 86400000) return Math.floor(d/3600000) + ' घंटे पहले';
  if (d < 7 * 86400000) return Math.floor(d/86400000) + ' दिन पहले';
  return new Date(ts).toLocaleDateString('hi-IN');
}
function formatNum(n) {
  if (!n) return '0';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return n.toString();
}

// === MEDIA HELPERS (in-app playback) ===
function getYouTubeId(url) {
  if (!url) return null;
  const m = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}
function getOdyseeId(url) {
  if (!url) return null;
  const m = url.match(/odysee\.com\/@[^:]+:([a-zA-Z0-9_-]+)/);
  return m ? m[1] : null;
}

function playMediaInline(mediaId, videoId, type) {
  const el = document.getElementById(mediaId);
  if (!el) return;
  if (type === 'youtube') {
    el.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
  } else if (type === 'odysee') {
    el.innerHTML = `<iframe src="https://odysee.com/embed/${videoId}" allowfullscreen></iframe>`;
  }
}

function expandImage(src) {
  showModal('Image', `<img src="${esc(src)}" style="width:100%;border-radius:8px;cursor:zoom-out;" onclick="closeModal()" />`);
}

// === NAVIGATION ===
function nav(page, data) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page)?.classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelector(`.nav-item[data-nav="${page}"]`)?.classList.add('active');
  if (page === 'home') loadHomeFeed();
  else if (page === 'groups') loadGroups();
  else if (page === 'explore') loadExplore();
  else if (page === 'profile') showMyProfile();
  else if (page === 'notifications') loadNotifications();
  else if (page === 'group' && data) openGroup(data);
  window.scrollTo(0, 0);
}

// === MODAL ===
function showModal(title, bodyHtml) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('genericModal').classList.add('show');
}
function closeModal() { document.getElementById('genericModal').classList.remove('show'); }

// === AUTH ===
async function checkAuth() {
  sessionId = localStorage.getItem('canyou_session');
  if (sessionId) {
    try {
      const res = await fetch(API + '/api/auth/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId }),
      });
      const data = await res.json();
      if (data.success) {
        currentUser = data.user;
        applyUserChip();
        document.getElementById('authModal').classList.add('hidden');
        loadHomeFeed();
        loadNotifications();
        return;
      }
    } catch (e) {}
  }
  document.getElementById('authModal').classList.remove('hidden');
}

async function registerUser() {
  const name = document.getElementById('authName').value.trim();
  if (!name) { toast('कृपया अपना नाम दर्ज करें'); return; }
  const phone = document.getElementById('authPhone').value.trim();
  const state = document.getElementById('authState').value;
  const city = document.getElementById('authCity').value.trim() || 'Unknown';
  const location = `${state}, ${city}`;
  try {
    const res = await fetch(API + '/api/auth/register', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, phone, country: 'India', location }),
    });
    const data = await res.json();
    if (data.success) {
      currentUser = data.user;
      sessionId = data.sessionId;
      localStorage.setItem('canyou_session', sessionId);
      applyUserChip();
      document.getElementById('authModal').classList.add('hidden');
      toast(`🎉 स्वागत है ${name}!`);
      loadHomeFeed();
      loadNotifications();
    }
  } catch (e) { toast('Registration failed'); }
}

function applyUserChip() {
  if (!currentUser) return;
  document.getElementById('userChip').classList.remove('hide');
  const av = document.getElementById('uAvatar');
  if (currentUser.avatar) {
    av.innerHTML = `<img src="${esc(currentUser.avatar)}" alt="" />`;
  } else {
    av.textContent = (currentUser.name[0] || 'U').toUpperCase();
  }
  document.getElementById('uName').textContent = currentUser.name;
}

// === HOME FEED (mix of group posts + auto-imported videos) ===
async function loadHomeFeed() {
  const container = document.getElementById('homeFeed');
  container.innerHTML = '<div class="empty"><div class="emoji">⏳</div><div class="text">Loading...</div></div>';
  try {
    // Load user's groups posts
    const userGroups = await fetch(`${API}/api/groups?userId=${currentUser?.id || ''}`).then(r => r.json());
    const groupIds = (userGroups.groups || []).map(g => g.id);
    // Load posts from each group
    let allPosts = [];
    for (const gid of groupIds.slice(0, 5)) {
      const r = await fetch(`${API}/api/groups/${gid}/posts?userId=${currentUser?.id || ''}&limit=10`).then(r => r.json());
      allPosts = allPosts.concat((r.posts || []).map(p => ({ ...p, _group: gid })));
    }
    // Also add auto-imported channel links (existing system)
    const links = await fetch(`${API}/api/links?source=channel&limit=10`).then(r => r.json());
    const autoPosts = (links.links || []).map(l => ({
      id: l.id, type: 'auto', _group: 'channels',
      text: l.title, mediaUrl: l.thumbnail, linkUrl: l.url, linkTitle: l.title,
      linkDescription: l.description, linkImage: l.thumbnail,
      user: { name: l.addedBy, avatar: '' }, createdAt: l.addedAt,
      reactionCount: 0, commentCount: l.commentCount || 0, viewCount: 0,
      platform: l.platform, _autoLink: l,
    }));
    allPosts = allPosts.concat(autoPosts);
    allPosts.sort((a, b) => b.createdAt - a.createdAt);
    // Load stories
    loadStories();
    if (allPosts.length === 0) {
      container.innerHTML = '<div class="empty"><div class="emoji">👋</div><div class="text">अभी कोई पोस्ट नहीं है।<br>कोई ग्रुप join करें या खुद का बनाएं!</div></div>';
      return;
    }
    container.innerHTML = allPosts.map(p => renderPost(p)).join('');
  } catch (e) {
    container.innerHTML = '<div class="empty"><div class="emoji">❌</div><div class="text">Failed to load feed</div></div>';
    console.error(e);
  }
}

// === STORIES ===
async function loadStories() {
  try {
    const res = await fetch(`${API}/api/stories?userId=${currentUser?.id || ''}`).then(r => r.json());
    const strip = document.getElementById('storiesStrip');
    strip.innerHTML = `<div class="story-item" onclick="openStoryComposer()"><div class="story-circle empty"><div class="inner"><div class="emoji">➕</div></div></div><div class="story-name">Your Story</div></div>`;
    (res.groups || []).forEach(g => {
      const latest = g.stories[0];
      const seen = g.stories.every(s => s.viewers?.includes(currentUser?.id));
      const emoji = latest.type === 'text' ? '📝' : latest.type === 'image' ? '🖼️' : '🎥';
      strip.innerHTML += `
        <div class="story-item" onclick="viewStory('${g.userId}')">
          <div class="story-circle ${seen ? 'seen' : ''}">
            <div class="inner">
              ${g.user?.avatar ? `<img src="${esc(g.user.avatar)}" />` : `<div class="emoji">${emoji}</div>`}
            </div>
          </div>
          <div class="story-name">${esc(g.user?.name || 'User')}</div>
        </div>`;
    });
  } catch (e) { console.error(e); }
}

function openStoryComposer() {
  if (!currentUser) return;
  showModal('Create Story', `
    <div class="form-group">
      <label>Story Type</label>
      <select id="storyType">
        <option value="text">📝 Text</option>
        <option value="image">🖼️ Image URL</option>
      </select>
    </div>
    <div class="form-group">
      <label>Content</label>
      <textarea id="storyContent" placeholder="Write something... या image URL paste करें"></textarea>
    </div>
    <div class="form-group">
      <label>Background Color</label>
      <input type="color" id="storyBg" value="#667eea" />
    </div>
    <button class="btn" onclick="postStory()">Post Story 🚀</button>
  `);
}

async function postStory() {
  const type = document.getElementById('storyType').value;
  const content = document.getElementById('storyContent').value.trim();
  if (!content) { toast('Content दर्ज करें'); return; }
  const bg = document.getElementById('storyBg').value;
  await fetch(API + '/api/stories', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ userId: currentUser.id, type, content, background: bg }),
  });
  closeModal();
  toast('✅ Story posted!');
  loadStories();
}

function viewStory(userId) {
  // Simple viewer
  fetch(`${API}/api/stories?userId=${currentUser?.id}`).then(r => r.json()).then(data => {
    const group = (data.groups || []).find(g => g.userId === userId);
    if (!group) return;
    const story = group.stories[0];
    fetch(API + '/api/stories/' + story.id + '/view', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: currentUser?.id }),
    });
    let contentHtml = '';
    if (story.type === 'text') {
      contentHtml = `<div style="background:${esc(story.background)};padding:60px 20px;border-radius:12px;text-align:center;font-size:24px;font-weight:700;line-height:1.4;">${esc(story.content)}</div>`;
    } else if (story.type === 'image') {
      contentHtml = `<img src="${esc(story.content)}" style="width:100%;border-radius:12px;" />`;
    }
    showModal(group.user?.name || 'Story', contentHtml + `<p style="text-align:center;margin-top:12px;opacity:0.6;font-size:12px;">⏱ 24 घंटे में गायब हो जाएगी</p>`);
  });
}

// === POST RENDERING (Facebook-style, in-app playback) ===
function renderPost(p) {
  const user = p.user || { name: 'User', avatar: '' };
  const avatar = user.avatar ?
    `<img src="${esc(user.avatar)}" alt="" />` :
    (user.name[0] || 'U').toUpperCase();
  let media = '';
  // Detect media
  const ytId = p.linkUrl ? getYouTubeId(p.linkUrl) : null;
  const odyseeId = p.linkUrl ? getOdyseeId(p.linkUrl) : null;
  const mediaId = 'media-' + p.id;
  if (p.type === 'image' && p.mediaUrl) {
    media = `<div class="post-media"><img src="${esc(p.mediaUrl)}" loading="lazy" onclick="expandImage('${esc(p.mediaUrl)}')" /></div>`;
  } else if (p.type === 'video' && p.mediaUrl) {
    media = `<div class="post-media"><video src="${esc(p.mediaUrl)}" controls playsinline style="width:100%;"></video></div>`;
  } else if (p.type === 'gif' && p.mediaUrl) {
    media = `<div class="post-media"><img src="${esc(p.mediaUrl)}" loading="lazy" /></div>`;
  } else if (p.type === 'voice' && p.voiceUrl) {
    media = `<div style="padding:12px 14px;"><audio controls src="${esc(p.voiceUrl)}" style="width:100%;"></audio></div>`;
  } else if (ytId) {
    media = `<div class="post-media" id="${mediaId}">
      <div class="play-overlay" onclick="playMediaInline('${mediaId}','${ytId}','youtube')">
        <div class="play-btn">▶</div>
      </div>
      <img src="https://i.ytimg.com/vi/${ytId}/hqdefault.jpg" loading="lazy" />
    </div>`;
  } else if (odyseeId) {
    media = `<div class="post-media" id="${mediaId}">
      <div class="play-overlay" onclick="playMediaInline('${mediaId}','${odyseeId}','odysee')">
        <div class="play-btn">▶</div>
      </div>
      <img src="${esc(p.mediaUrl || p.linkImage || '')}" loading="lazy" onerror="this.style.display='none'" />
    </div>`;
  } else if (p.mediaUrl && (p.type === 'auto' || p.type === 'mixed')) {
    media = `<div class="post-media"><img src="${esc(p.mediaUrl)}" loading="lazy" onclick="expandImage('${esc(p.mediaUrl)}')" /></div>`;
  }
  // Link card
  let linkCard = '';
  if (p.linkUrl && p.type !== 'image' && p.type !== 'video' && !ytId && !odyseeId) {
    linkCard = `
      <div class="link-card" onclick="window.open('${esc(p.linkUrl)}','_blank')">
        ${p.linkImage ? `<img src="${esc(p.linkImage)}" class="lk-image" onerror="this.style.display='none'" />` : ''}
        <div class="lk-body">
          <div class="lk-domain">🌐 ${esc(extractDomain(p.linkUrl))}</div>
          <div class="lk-title">${esc(p.linkTitle || p.linkUrl)}</div>
          ${p.linkDescription ? `<div class="lk-desc">${esc(p.linkDescription)}</div>` : ''}
        </div>
      </div>`;
  }
  // Poll
  let poll = '';
  if (p.type === 'poll' && p.pollOptions) {
    const totalVotes = p.pollOptions.reduce((s, o) => s + (o.votes?.length || 0), 0);
    poll = `<div class="poll-container">${p.pollOptions.map(o => {
      const votes = o.votes?.length || 0;
      const pct = totalVotes > 0 ? Math.round((votes / totalVotes) * 100) : 0;
      const voted = o.votes?.includes(currentUser?.id);
      return `<div class="poll-option ${voted ? 'voted' : ''}" onclick="votePoll('${p.id}','${o.id}')">
        <div class="bar" style="width:${pct}%"></div>
        <div class="text"><span>${voted ? '✅ ' : ''}${esc(o.text)}</span><span class="pct">${pct}%</span></div>
      </div>`;
    }).join('')}<div style="font-size:11px;opacity:0.6;margin-top:6px;">${totalVotes} votes</div></div>`;
  }
  // Reactions summary
  const r = p.reactions || {};
  const reactionPills = [];
  if (r.like) reactionPills.push(`<span class="react-pill">👍 ${r.like}</span>`);
  if (r.love) reactionPills.push(`<span class="react-pill">❤️ ${r.love}</span>`);
  if (r.laugh) reactionPills.push(`<span class="react-pill">😂 ${r.laugh}</span>`);
  if (r.wow) reactionPills.push(`<span class="react-pill">😮 ${r.wow}</span>`);
  if (r.sad) reactionPills.push(`<span class="react-pill">😢 ${r.sad}</span>`);
  if (r.angry) reactionPills.push(`<span class="react-pill">😡 ${r.angry}</span>`);
  const reactionsHtml = reactionPills.length > 0 ?
    `<div class="reactions-bar">${reactionPills.join('')}<div class="summary">${formatNum(p.commentCount || 0)} comments • ${formatNum(p.viewCount || 0)} views</div></div>` :
    `<div class="reactions-bar"><div class="summary">${formatNum(p.commentCount || 0)} comments</div></div>`;
  return `
    <div class="post" data-id="${p.id}">
      <div class="post-header">
        <div class="avatar">${avatar}</div>
        <div class="info">
          <div class="name">${esc(user.name)} ${p.platform ? `<span class="platform-tag ${p.platform}">${p.platform}</span>` : ''}</div>
          <div class="meta">${timeAgo(p.createdAt)} ${p._group && p._group !== 'channels' ? '• 👥 ' + esc(p._group).slice(0, 20) : ''}</div>
        </div>
        <button class="post-menu" onclick="showPostMenu('${p.id}','${p._group || ''}')">⋯</button>
      </div>
      ${p.text ? `<div class="post-text">${esc(p.text)}</div>` : ''}
      ${media}
      ${linkCard}
      ${poll}
      ${reactionsHtml}
      <div class="post-actions">
        <button class="action-btn" onclick="showReactionsPicker(event, '${p.id}','${p._group || ''}')">👍 Like</button>
        <button class="action-btn" onclick="openCommentSheet('${p.id}','${p._group || ''}')">💬 Comment</button>
        <button class="action-btn" onclick="sharePost('${esc(p.linkUrl || p.mediaUrl || '')}')">↗ Share</button>
        <button class="action-btn" onclick="repost('${p.id}')">🔁 Repost</button>
      </div>
    </div>`;
}

function extractDomain(url) { try { return new URL(url).hostname.replace('www.', ''); } catch { return ''; } }

// === REACTIONS ===
function showReactionsPicker(e, postId, groupId) {
  e.preventDefault();
  e.stopPropagation();
  const btn = e.currentTarget;
  const picker = document.getElementById('reactionsPicker');
  const rect = btn.getBoundingClientRect();
  picker.style.left = rect.left + 'px';
  picker.style.bottom = (window.innerHeight - rect.top + 5) + 'px';
  picker.classList.add('show');
  currentReactTarget = { postId, groupId, btn };
  setTimeout(() => {
    document.addEventListener('click', hideReactionsPicker, { once: true });
  }, 100);
}
function hideReactionsPicker() {
  document.getElementById('reactionsPicker').classList.remove('show');
}
async function reactWith(type) {
  hideReactionsPicker();
  if (!currentReactTarget || !currentUser) return;
  const { postId, groupId } = currentReactTarget;
  await fetch(API + '/api/reactions', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ userId: currentUser.id, targetType: 'groupPost', targetId: postId, reaction: type }),
  });
  loadHomeFeed();
  if (currentPage === 'group' && currentGroup) openGroup(currentGroup);
}

function votePoll(postId, optionId) {

let recordedVoiceUrl = null;
async function recordVoiceForPost() {
  const btn = document.getElementById('voiceRecBtn');
  const status = document.getElementById('voiceStatus');
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    btn.textContent = '🎤 Start Recording';
    status.textContent = 'Recording saved';
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = () => {
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      const reader = new FileReader();
      reader.onload = ev => { recordedVoiceUrl = ev.target.result; status.textContent = '✅ Voice ready (' + Math.round(blob.size/1024) + 'KB)'; };
      reader.readAsDataURL(blob);
      stream.getTracks().forEach(t => t.stop());
    };
    mediaRecorder.start();
    btn.textContent = '⏹ Stop Recording';
    status.textContent = '🔴 Recording...';
  } catch (e) { toast('Microphone access denied'); }
}

async function submitPost() {
  if (!currentUser) return;
  const type = document.getElementById('postType').value;
  const text = document.getElementById('postText').value.trim();
  const groupId = document.getElementById('postGroup').value;
  if (!text && type === 'text') { toast('Write something'); return; }
  const payload = { userId: currentUser.id, type, text };
  if (type === 'image' || type === 'video' || type === 'gif') {
    payload.mediaUrl = document.getElementById('postMediaUrl').value.trim();
  } else if (type === 'link') {
    payload.linkUrl = document.getElementById('postLinkUrl').value.trim();
  } else if (type === 'poll') {
    const options = document.getElementById('pollOptions').value.split('\n').map(s => s.trim()).filter(Boolean);
    payload.pollOptions = options.map((o, i) => ({ id: 'opt_' + i, text: o, votes: [] }));
  } else if (type === 'voice') {
    payload.voiceUrl = recordedVoiceUrl;
  }
  let url;
  if (groupId) {
    url = API + '/api/groups/' + groupId + '/posts';
  } else {
    // Post to general feed (treat as link post for now)
    if (type === 'link' && payload.linkUrl) {
      url = API + '/api/links';
      payload.url = payload.linkUrl;
      delete payload.linkUrl; delete payload.type;
    } else {
      toast('Please select a group to post this type');
      return;
    }
  }
  const res = await fetch(url, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  const data = await res.json();
  if (data.success) {
    closeModal();
    toast('✅ Posted!');
    loadHomeFeed();
  } else {
    toast('❌ ' + (data.error || 'Failed'));
  }
}
